  const dict = window.FM_I18N[window.FM_LANG] || window.FM_I18N.es;
  let text = dict[key] || window.FM_I18N.es[key] || key;
  if (replacements) {
    Object.entries(replacements).forEach(([k, v]) => {
      text = text.replace(new RegExp('\\{' + k + '\\}', 'g'), v);
    });
  }
  return text;
};
window.setLanguage = function(lang) {
  if (!window.FM_I18N[lang]) return;

  localStorage.setItem('fm_lang', lang);

<style>
:root{
  /* Paleta verde militar oscuro + neón + dorado/azul (ESPN broadcast) */
  --fm-gold:#f4c542; --fm-gold-soft:#ffe27a; --fm-gold-deep:#7a5410;
  --fm-blue:#3fbfff; --fm-blue-deep:#0a4a72;
  --fm-cyan:#39ff88;          /* verde neón (acento activo) */
  --fm-cyan-deep:#1d5a2a;     /* verde militar medio */
  --fm-text:#e8f5e2; --fm-text-dim:#7a9785;
  --fm-bg:#070d09;            /* verde militar casi negro */
  --fm-surface:#0e1a12;
  --fm-surface-2:#152419;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:"Rajdhani","Oswald",system-ui,sans-serif;
  color:var(--fm-text);
  background:
    radial-gradient(ellipse 80% 40% at 50% 0%, rgba(57,255,136,.10), transparent 70%),
    radial-gradient(ellipse 60% 30% at 50% 100%, rgba(63,191,255,.06), transparent 70%),
    linear-gradient(180deg, #0a1410 0%, var(--fm-bg) 60%, #050a07 100%);
  min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;
}
/* Subtle field-line pattern overlay for broadcast feel */
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    repeating-linear-gradient(90deg, rgba(57,255,136,.018) 0 1px, transparent 1px 64px),
    repeating-linear-gradient(0deg, rgba(57,255,136,.014) 0 1px, transparent 1px 64px);
  mask-image:radial-gradient(ellipse at center, #000 30%, transparent 75%);
}
body > *{position:relative;z-index:1}
button{font-family:inherit;color:inherit;background:none;border:none;cursor:pointer;padding:0}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 10px;font-size:11px;letter-spacing:.15em;text-transform:uppercase}
.statusbar{display:flex;gap:14px;color:var(--fm-text-dim);flex-wrap:wrap}
.statusbar b{color:var(--fm-gold)}
.statusbar .lvl b{color:var(--fm-text)}
.close{font-size:26px;color:var(--fm-text-dim);transition:color .2s,transform .2s}
.close:hover{color:var(--fm-gold);transform:rotate(90deg)}

.chips{display:flex;gap:8px;flex-wrap:wrap;padding:0 20px 10px}
.chip{
  background:linear-gradient(180deg,rgba(29,90,42,.6),rgba(7,30,15,.8));
  border:1px solid rgba(57,255,136,.35);border-radius:999px;padding:5px 12px;
  font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--fm-cyan);
  box-shadow:0 0 12px rgba(57,255,136,.18), inset 0 1px 0 rgba(255,255,255,.04);
}

main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 12px 16px;text-align:center}
.title{
  font-family:"Oswald",sans-serif;font-weight:700;letter-spacing:.18em;
  font-size:clamp(36px,8vw,68px);
  background:linear-gradient(180deg,#fff 0%,var(--fm-cyan) 45%,var(--fm-gold) 75%,var(--fm-gold-deep) 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  text-shadow:0 2px 18px rgba(57,255,136,.25);margin-bottom:4px;line-height:1;
}
.sub{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--fm-text-dim);margin-bottom:18px}

/* Stage */
.stage{
  width:100%;max-width:640px;
  display:grid;grid-template-columns:auto 1fr auto;align-items:center;
  justify-items:center;gap:6px;margin-bottom:22px;
}
.rail{display:flex;flex-direction:column;gap:18px;padding:4px 2px}

/* Icon button — sin recuadro, ícono flotante con glow profesional */
.icon-btn{
  position:relative;
  display:flex;flex-direction:column;align-items:center;gap:7px;
  width:62px;
  transition:transform .35s cubic-bezier(.34,1.56,.64,1);
}
.icon-btn:hover{transform:translateY(-3px)}
.icon-btn .glyph{
  position:relative;
  width:46px;height:46px;
  display:flex;align-items:center;justify-content:center;
  color:var(--fm-cyan);
  filter:
    drop-shadow(0 2px 0 rgba(0,0,0,.55))
    drop-shadow(0 6px 10px rgba(0,0,0,.65))
    drop-shadow(0 0 12px rgba(79,217,196,.45));
  transition:color .25s,filter .3s,transform .3s;
}
.icon-btn:hover .glyph{
  color:var(--fm-gold-soft);
  filter:
    drop-shadow(0 2px 0 rgba(0,0,0,.55))
    drop-shadow(0 8px 14px rgba(0,0,0,.7))
    drop-shadow(0 0 18px rgba(232,195,74,.7));
  transform:scale(1.08);
}
.icon-btn .glyph svg{width:42px;height:42px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;transition:transform .35s ease}
.icon-btn:hover .glyph svg{transform:scale(1.06)}
.icon-btn.gold .glyph{
  color:var(--fm-gold);
  filter:
    drop-shadow(0 2px 0 rgba(0,0,0,.55))
    drop-shadow(0 6px 10px rgba(0,0,0,.65))
    drop-shadow(0 0 16px rgba(232,195,74,.6));
}
.icon-btn .lbl{
  font-family:"Oswald",sans-serif;font-weight:600;font-size:10px;
  letter-spacing:.18em;text-transform:uppercase;color:var(--fm-text);
  text-shadow:0 1px 6px rgba(0,0,0,.85), 0 0 12px rgba(0,0,0,.6);
  transition:color .2s, letter-spacing .25s;
}
.icon-btn:hover .lbl{color:var(--fm-gold);letter-spacing:.22em}

/* Numeric badge */
.icon-btn .badge{
  position:absolute;top:-4px;right:2px;
  min-width:18px;height:18px;padding:0 5px;
  display:inline-flex;align-items:center;justify-content:center;
  background:linear-gradient(180deg,#ff5a3c,#c12a14);
  color:#fff;border-radius:999px;
  font-family:"Oswald",sans-serif;font-size:10px;font-weight:700;line-height:1;
  border:1.5px solid var(--fm-bg);
  box-shadow:0 2px 6px rgba(193,42,20,.55), 0 0 0 1px rgba(255,255,255,.08) inset;
  animation:pulse 2.2s ease-in-out infinite;
  z-index:2;
}
.icon-btn .badge.gold{
  background:linear-gradient(180deg,var(--fm-gold-soft),var(--fm-gold) 55%,var(--fm-gold-deep));
  color:#1a1003;box-shadow:0 2px 6px rgba(232,195,74,.55);
}

/* Hero — pedestal & centered */
.hero-wrap{
  position:relative;
  width:100%;max-width:340px;
  aspect-ratio:1;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto;
  isolation:isolate;
}
/* Light halo behind */
.hero-wrap::before{
  content:"";position:absolute;
  width:78%;height:78%;top:8%;left:11%;
  border-radius:50%;
  background:radial-gradient(circle, rgba(232,195,74,.38), rgba(79,217,196,.14) 55%, transparent 72%);
  filter:blur(38px);
  z-index:-2;
  animation:halo 5s ease-in-out infinite;
}
/* Pedestal/shadow under trophy */
.hero-wrap::after{
  content:"";position:absolute;
  bottom:-2%;left:50%;transform:translateX(-50%);
  width:62%;height:14%;
  background:
    radial-gradient(ellipse at center,
      rgba(232,195,74,.55) 0%,
      rgba(232,195,74,.25) 25%,
      rgba(0,0,0,.65) 55%,
      transparent 75%);
  filter:blur(10px);
  z-index:-1;
  animation:pedestal 4s ease-in-out infinite;
}
.hero-img{
  position:relative;
  width:100%;height:100%;
  object-fit:contain;object-position:center;
  filter:drop-shadow(0 28px 30px rgba(0,0,0,.75)) drop-shadow(0 0 24px rgba(232,195,74,.18));
  animation:fl 4s ease-in-out infinite;
}
/* Fallback placeholder if image missing */
.hero-fallback{
  width:80%;height:80%;border-radius:50%;
  background:
    radial-gradient(circle at 35% 30%, rgba(255,255,255,.25), transparent 50%),
    radial-gradient(circle at 50% 60%, var(--fm-gold), var(--fm-gold-deep) 70%, #2a1a05);
  display:flex;align-items:center;justify-content:center;
  font-family:"Oswald";font-weight:700;font-size:48px;color:#1a1003;
  box-shadow:inset 0 -10px 30px rgba(0,0,0,.4), inset 0 6px 18px rgba(255,255,255,.25);
  animation:fl 4s ease-in-out infinite;
}

/* CTA — sin recuadro, imagen fotográfica con halo */
.actions{width:100%;max-width:420px;display:grid;grid-template-columns:1fr 1fr;gap:18px;padding:0 8px}
.btn-play{
  position:relative;
  display:flex;align-items:center;justify-content:center;
  aspect-ratio:1;width:100%;
  background:transparent;border:none;padding:0;
  cursor:pointer;
  transition:transform .3s ease, filter .3s ease;
  filter:
    drop-shadow(0 10px 18px rgba(0,0,0,.7))
    drop-shadow(0 0 22px rgba(232,195,74,.25));
}
.btn-play::before{
  content:"";position:absolute;inset:8%;
  border-radius:50%;
  background:radial-gradient(circle, rgba(232,195,74,.35), rgba(79,217,196,.12) 55%, transparent 72%);
  filter:blur(20px);
  z-index:-1;
  animation:halo 5s ease-in-out infinite;
}
.btn-play .ill{
  width:100%;height:100%;
  display:block;
  -webkit-mask-image:radial-gradient(circle at 50% 50%, #000 58%, transparent 78%);
  mask-image:radial-gradient(circle at 50% 50%, #000 58%, transparent 78%);
}
.btn-play .ill img{
  width:100%;height:100%;object-fit:cover;display:block;
  transition:transform .4s ease;
}
.btn-play:hover{transform:translateY(-3px) scale(1.03);filter:drop-shadow(0 14px 22px rgba(0,0,0,.75)) drop-shadow(0 0 32px rgba(232,195,74,.55))}
.btn-play:hover .ill img{transform:scale(1.06)}

/* Tabbar — sin recuadros, íconos flotantes */
.tabbar{
  display:grid;grid-template-columns:repeat(4,1fr);padding:14px 8px 18px;
  background:transparent;border:none;
}
.tab{
  display:flex;flex-direction:column;align-items:center;gap:6px;padding:6px;
  font-family:"Oswald",sans-serif;font-size:10px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--fm-text-dim);transition:color .2s, transform .2s;
  background:transparent;
}
.tab svg{
  width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;
  filter:drop-shadow(0 2px 4px rgba(0,0,0,.6)) drop-shadow(0 0 8px rgba(79,217,196,.25));
  transition:filter .25s;
}
.tab:hover,.tab.active{color:var(--fm-gold)}
.tab:hover svg,.tab.active svg{filter:drop-shadow(0 2px 4px rgba(0,0,0,.6)) drop-shadow(0 0 12px rgba(232,195,74,.6))}
.tab:hover{transform:translateY(-2px)}

/* Animations */
@keyframes glow{0%,100%{box-shadow:inset 0 1px 0 rgba(255,255,255,.6),inset 0 -2px 0 rgba(0,0,0,.25),0 0 20px rgba(232,195,74,.35)}50%{box-shadow:inset 0 1px 0 rgba(255,255,255,.6),inset 0 -2px 0 rgba(0,0,0,.25),0 0 40px rgba(232,195,74,.65)}}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes halo{0%,100%{opacity:.85;transform:scale(1)}50%{opacity:1;transform:scale(1.06)}}
@keyframes pedestal{0%,100%{transform:translateX(-50%) scale(1);opacity:.9}50%{transform:translateX(-50%) scale(.88);opacity:1}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}

@media (max-width:380px){
  .icon-btn{width:54px}
  .icon-btn .glyph{width:42px;height:42px}
  .icon-btn .glyph svg{width:24px;height:24px}
  .icon-btn .lbl{font-size:9px;letter-spacing:.12em}
  .rail{gap:14px}
  .hero-wrap{max-width:240px}
}
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation:none!important;transition:none!important}
}


/* ===== ESPN broadcast accents ===== */
.m-broadcast-bar{
  display:flex;align-items:center;gap:8px;margin:-4px 0 12px;
  font-family:"Oswald";font-size:10px;letter-spacing:.22em;text-transform:uppercase;
  color:var(--fm-cyan);
}
.m-broadcast-bar::before{
  content:"●";color:#ff3b3b;font-size:14px;animation:pulse 1.8s infinite;
  text-shadow:0 0 8px rgba(255,59,59,.7);
}
.m-broadcast-bar .live{color:#ff5a3c;font-weight:700}
.m-broadcast-bar .sep{flex:1;height:1px;background:linear-gradient(90deg,rgba(57,255,136,.4),transparent)}

/* Reward badge dorado/azul */
.m-reward-strip{
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(90deg, rgba(244,197,66,.12), rgba(63,191,255,.12));
  border:1px solid rgba(244,197,66,.35);border-radius:18px;padding:10px 14px;
  margin-bottom:12px;
}
.m-reward-strip .lbl{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--fm-text-dim);font-family:"Oswald"}
.m-reward-strip .val{
  font-family:"Oswald";font-weight:700;font-size:18px;
  background:linear-gradient(180deg,#fff,var(--fm-gold) 50%,var(--fm-gold-deep));
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.m-reward-strip .blue{
  background:linear-gradient(180deg,#fff,var(--fm-blue) 50%,var(--fm-blue-deep));
  -webkit-background-clip:text;background-clip:text;color:transparent;
}

/* 3D Stadium (CSS-only) */
.stadium3d{
  perspective:900px;
  aspect-ratio:16/10;border-radius:22px;overflow:hidden;
  background:radial-gradient(ellipse at 50% 30%, #0d2218 0%, #050a07 80%);
  border:1px solid rgba(57,255,136,.25);
  position:relative;margin-bottom:12px;
  box-shadow:inset 0 0 40px rgba(0,0,0,.6), 0 8px 24px rgba(0,0,0,.4);
}
.stadium3d .field{
  position:absolute;left:50%;top:55%;
  width:88%;aspect-ratio:16/9;
  transform:translate(-50%,-50%) rotateX(58deg);
  transform-style:preserve-3d;
  background:
    repeating-linear-gradient(90deg, rgba(255,255,255,.05) 0 8%, transparent 8% 16%),
    linear-gradient(180deg,#1e6b3a 0%,#0f4a25 100%);
  border-radius:6px;
  box-shadow:
    inset 0 0 0 2px rgba(255,255,255,.4),
    0 30px 50px rgba(57,255,136,.25);
}
.stadium3d .field::before{
  content:"";position:absolute;left:50%;top:0;bottom:0;width:2px;
  background:rgba(255,255,255,.4);transform:translateX(-50%);
}
.stadium3d .field::after{
  content:"";position:absolute;left:50%;top:50%;
  width:24%;aspect-ratio:1;border-radius:50%;
  border:2px solid rgba(255,255,255,.4);
  transform:translate(-50%,-50%);
}
.stadium3d .stands{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 80% 50% at 50% 100%, rgba(57,255,136,.25), transparent 60%),
    radial-gradient(ellipse 70% 40% at 50% 0%, rgba(244,197,66,.10), transparent 60%);
  pointer-events:none;
}
.stadium3d .lights{
  position:absolute;top:6%;left:0;right:0;height:30%;
  background:radial-gradient(ellipse 30% 100% at 20% 0%, rgba(255,255,255,.18), transparent 60%),
             radial-gradient(ellipse 30% 100% at 80% 0%, rgba(255,255,255,.18), transparent 60%);
  pointer-events:none;
}
.stadium3d .badge{
  position:absolute;top:10px;left:10px;
  background:rgba(0,0,0,.6);border:1px solid rgba(57,255,136,.4);
  border-radius:999px;padding:4px 10px;font-family:"Oswald";font-size:10px;
  letter-spacing:.18em;color:var(--fm-cyan);
}

/* Isometric pitch card */
.iso-pitch{
  aspect-ratio:1.4;border-radius:22px;overflow:hidden;position:relative;
  background:linear-gradient(180deg,#0d1f14,#050a07);
  border:1px solid rgba(57,255,136,.25);
  display:flex;align-items:center;justify-content:center;
  box-shadow:inset 0 0 30px rgba(0,0,0,.5);
}
.iso-pitch .turf{
  width:78%;aspect-ratio:1.6;
  transform:rotateX(60deg) rotateZ(-45deg);
  background:
    repeating-linear-gradient(90deg, rgba(255,255,255,.04) 0 10%, transparent 10% 20%),
    linear-gradient(135deg,#2a8a4a,#155a2a);
  border:2px solid rgba(255,255,255,.35);
  border-radius:6px;
  box-shadow:
    0 20px 40px rgba(57,255,136,.3),
    inset 0 0 0 8px rgba(255,255,255,.06);
  position:relative;
}
.iso-pitch .turf::after{
  content:"";position:absolute;left:50%;top:50%;
  width:24%;aspect-ratio:1;border-radius:50%;
  border:2px solid rgba(255,255,255,.4);
  transform:translate(-50%,-50%);
}
.iso-pitch.arena .turf{background:linear-gradient(135deg,#3a3a8a,#1a1a4a);}
.iso-pitch.barrial .turf{background:linear-gradient(135deg,#8a6b3a,#5a3e1a);}

/* Stadium picker grid */
.stadium-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stadium-card{
  background:linear-gradient(180deg,rgba(21,36,25,.75),rgba(7,13,9,.9));
  border:1px solid rgba(57,255,136,.22);border-radius:22px;padding:10px;
  cursor:pointer;transition:all .25s;text-align:center;
}
.stadium-card:hover{transform:translateY(-3px);border-color:var(--fm-cyan);box-shadow:0 8px 20px rgba(57,255,136,.25)}
.stadium-card .iso-pitch{aspect-ratio:1.6;margin-bottom:8px;border-radius:14px}
.stadium-card .name{font-family:"Oswald";font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--fm-text)}
.stadium-card .meta{font-size:10px;color:var(--fm-cyan);letter-spacing:.1em;margin-top:2px}
.stadium-card.gold{border-color:var(--fm-gold)}
.stadium-card.gold .name{color:var(--fm-gold)}

/* Title gradient now: white → neon-green → gold (broadcast) */

/* ===== Modal ===== */
.modal-backdrop{
  position:fixed;inset:0;background:rgba(2,10,9,.78);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  display:none;align-items:flex-start;justify-content:center;z-index:1000;
  padding:24px 14px;overflow-y:auto;
  animation:fadeIn .25s ease;
}
.modal-backdrop.open{display:flex}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px) scale(.96)}to{opacity:1;transform:none}}

.modal{
  position:relative;width:100%;max-width:420px;
  background:
    radial-gradient(ellipse at top, rgba(57,255,136,.14), transparent 55%),
    linear-gradient(180deg, var(--fm-surface) 0%, #050a07 100%);
  border:1px solid rgba(57,255,136,.30);
  border-radius:28px;
  box-shadow:
    0 30px 60px rgba(0,0,0,.75),
    0 0 0 1px rgba(57,255,136,.08) inset,
    0 0 50px rgba(57,255,136,.15);
  padding:20px 20px 24px;
  animation:slideUp .35s cubic-bezier(.34,1.56,.64,1);
  margin:auto;
  overflow:hidden;
}
.modal::before{
  content:"";position:absolute;inset:0;border-radius:28px;pointer-events:none;
  background:linear-gradient(135deg, rgba(57,255,136,.18), transparent 30%, transparent 70%, rgba(244,197,66,.12));
  mix-blend-mode:screen;opacity:.7;
}
.modal > *{position:relative;z-index:1}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.modal-title{
  font-family:"Oswald",sans-serif;font-weight:700;letter-spacing:.22em;
  font-size:14px;text-transform:uppercase;
  background:linear-gradient(180deg,#fff 0%,var(--fm-gold) 60%,var(--fm-gold-deep) 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  display:flex;align-items:center;gap:8px;
}
.modal-title::before{content:"";width:6px;height:18px;background:linear-gradient(180deg,var(--fm-gold-soft),var(--fm-gold-deep));border-radius:2px;box-shadow:0 0 8px var(--fm-gold)}
.modal-close{
  width:30px;height:30px;border-radius:50%;
  display:inline-flex;align-items:center;justify-content:center;
  font-size:22px;color:var(--fm-text-dim);
  background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.06);
  transition:all .25s;
}
.modal-close:hover{color:var(--fm-gold);transform:rotate(90deg);border-color:var(--fm-gold)}

/* Hero card (tournament style) */
.m-hero{
  position:relative;
  background:
    linear-gradient(180deg,rgba(21,36,25,.85),rgba(7,13,9,.9));
  border:1px solid rgba(57,255,136,.25);
  border-radius:24px;padding:20px 16px 22px;text-align:center;
  margin-bottom:14px;overflow:hidden;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.04), 0 8px 24px rgba(0,0,0,.4);
}
.m-hero::after{
  content:"";position:absolute;inset:0;
  background:radial-gradient(ellipse at top, rgba(232,195,74,.18), transparent 60%);
  pointer-events:none;
}
.m-hero h3{
  font-family:"Oswald",sans-serif;font-size:13px;letter-spacing:.18em;text-transform:uppercase;
  color:var(--fm-text-dim);margin-bottom:8px;font-weight:600;
}
.m-bignum{
  font-family:"Oswald",sans-serif;font-size:44px;font-weight:700;letter-spacing:.04em;
  background:linear-gradient(180deg,#fff,var(--fm-gold) 55%,var(--fm-gold-deep));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  text-shadow:0 2px 14px rgba(232,195,74,.3);line-height:1;
}
.m-bignum small{font-size:18px;color:var(--fm-cyan);-webkit-text-fill-color:var(--fm-cyan);margin-left:6px;letter-spacing:.14em}
.m-trophy{
  width:78px;height:78px;border-radius:50%;margin:6px auto 10px;
  background:
    radial-gradient(circle at 35% 30%, rgba(255,255,255,.4), transparent 50%),
    radial-gradient(circle at 50% 60%, var(--fm-gold), var(--fm-gold-deep) 70%, #2a1a05);
  display:flex;align-items:center;justify-content:center;font-size:38px;
  box-shadow:inset 0 -8px 20px rgba(0,0,0,.4), 0 8px 24px rgba(232,195,74,.35);
  position:relative;z-index:1;
}

/* Countdown */
.m-count{
  display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:14px;
  position:relative;z-index:1;
}
.m-count div{
  background:rgba(0,0,0,.45);border:1px solid rgba(57,255,136,.25);border-radius:14px;
  padding:6px 4px;
}
.m-count b{
  display:block;font-family:"Oswald";font-size:18px;color:var(--fm-text);font-weight:700;
}
.m-count span{font-size:9px;letter-spacing:.14em;color:var(--fm-text-dim);text-transform:uppercase}

/* Section title */
.m-section{
  font-family:"Oswald",sans-serif;font-size:11px;letter-spacing:.22em;text-transform:uppercase;
  color:var(--fm-cyan);margin:6px 0 10px;text-align:center;
  display:flex;align-items:center;gap:8px;
}
.m-section::before,.m-section::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--fm-cyan-deep),transparent)}

/* Prize tiers grid */
.m-prizes{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.m-prize{
  background:linear-gradient(180deg,rgba(21,36,25,.85),rgba(7,13,9,.85));
  border:1px solid rgba(57,255,136,.22);border-radius:18px;
  padding:10px 6px;text-align:center;position:relative;
}
.m-prize.gold{border-color:var(--fm-gold);box-shadow:0 0 18px rgba(244,197,66,.4), inset 0 0 12px rgba(244,197,66,.08)}
.m-prize .pos{
  position:absolute;top:-8px;left:50%;transform:translateX(-50%);
  background:linear-gradient(180deg,var(--fm-gold-soft),var(--fm-gold-deep));
  color:#1a1003;font-family:"Oswald";font-size:10px;font-weight:700;
  padding:2px 8px;border-radius:8px;letter-spacing:.12em;
}
.m-prize .val{
  font-family:"Oswald";font-size:20px;font-weight:700;color:var(--fm-gold);
  margin-top:6px;line-height:1;
}
.m-prize .lbl{font-size:9px;letter-spacing:.14em;color:var(--fm-text-dim);text-transform:uppercase;margin-top:2px}

/* Stat rows */
.m-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.m-stat{
  background:linear-gradient(180deg,rgba(21,36,25,.7),rgba(7,13,9,.85));border:1px solid rgba(57,255,136,.18);border-radius:18px;
  padding:10px;display:flex;align-items:center;gap:10px;
}
.m-stat .ico{
  width:36px;height:36px;border-radius:12px;
  background:linear-gradient(180deg,rgba(57,255,136,.25),rgba(29,90,42,.5));border:1px solid rgba(57,255,136,.3);
  display:flex;align-items:center;justify-content:center;color:var(--fm-cyan);
  font-size:16px;flex-shrink:0;
}
.m-stat b{display:block;font-family:"Oswald";font-size:18px;color:var(--fm-text)}
.m-stat span{font-size:9px;letter-spacing:.12em;color:var(--fm-text-dim);text-transform:uppercase}

/* List rows */
.m-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.m-row{
  display:flex;align-items:center;gap:12px;
  background:linear-gradient(180deg,rgba(21,36,25,.65),rgba(7,13,9,.8));border:1px solid rgba(57,255,136,.15);border-radius:20px;
  padding:10px 12px;
}
.m-row .icn{
  width:38px;height:38px;border-radius:14px;flex-shrink:0;
  background:linear-gradient(135deg,rgba(57,255,136,.25),rgba(29,90,42,.4));border:1px solid rgba(57,255,136,.3);
  display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--fm-gold);
}
.m-row .meta{flex:1;min-width:0}
.m-row .meta b{display:block;font-family:"Oswald";font-size:13px;color:var(--fm-text);letter-spacing:.05em}
.m-row .meta span{font-size:11px;color:var(--fm-text-dim)}
.m-row .right{font-family:"Oswald";font-size:14px;color:var(--fm-gold);font-weight:700}

/* CTA buttons */
.m-cta{
  width:100%;padding:15px;border-radius:22px;
  font-family:"Oswald",sans-serif;font-weight:700;letter-spacing:.18em;text-transform:uppercase;
  font-size:13px;color:#1a1003;
  background:linear-gradient(180deg,var(--fm-gold-soft),var(--fm-gold) 55%,var(--fm-gold-deep));
  border:1px solid var(--fm-gold);
  box-shadow:0 4px 14px rgba(232,195,74,.4), inset 0 1px 0 rgba(255,255,255,.5);
  transition:all .25s;cursor:pointer;
}
.m-cta:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(232,195,74,.55), inset 0 1px 0 rgba(255,255,255,.5)}
.m-cta.ghost{
  background:transparent;color:var(--fm-cyan);
  border:1px solid var(--fm-cyan-deep);box-shadow:none;
}
.m-cta.ghost:hover{background:rgba(79,217,196,.08);color:var(--fm-gold);border-color:var(--fm-gold)}

/* Result chips (victory/draw/loss) */
.m-results{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.m-result{
  text-align:center;padding:12px 4px;border-radius:18px;
  background:linear-gradient(180deg,rgba(21,36,25,.7),rgba(7,13,9,.85));border:1px solid rgba(57,255,136,.22);
}
.m-result b{display:block;font-family:"Oswald";font-size:16px;color:var(--fm-gold)}
.m-result span{font-size:9px;letter-spacing:.14em;color:var(--fm-text-dim);text-transform:uppercase}
.m-result.win{border-color:#3fae6b;box-shadow:0 0 10px rgba(63,174,107,.2)}
.m-result.win b{color:#7ddc9b}
.m-result.draw{border-color:var(--fm-gold)}
.m-result.lose{border-color:#c1432a}
.m-result.lose b{color:#ff8a72}

.m-warn{
  background:rgba(193,67,42,.1);border:1px solid rgba(193,67,42,.3);
  color:#ffb09b;border-radius:8px;padding:8px 10px;font-size:11px;
  text-align:center;margin-bottom:10px;
}

.m-stadium{
  aspect-ratio:16/10;border-radius:22px;
  background:
    repeating-linear-gradient(90deg, rgba(255,255,255,.04) 0 14px, transparent 14px 28px),
    radial-gradient(ellipse at center, #1a6b4e 0%, #0a3a2b 70%);
  border:1px solid rgba(79,217,196,.3);
  position:relative;display:flex;align-items:center;justify-content:center;
  margin-bottom:12px;overflow:hidden;
  box-shadow:inset 0 0 40px rgba(0,0,0,.5);
}
.m-stadium::before{
  content:"";position:absolute;width:60%;height:80%;
  border:2px solid rgba(255,255,255,.25);border-radius:6px;
}
.m-stadium::after{
  content:"";position:absolute;width:18%;aspect-ratio:1;border-radius:50%;
  border:2px solid rgba(255,255,255,.25);
}
.m-stadium .ball{
  position:relative;z-index:2;font-size:36px;
  filter:drop-shadow(0 4px 8px rgba(0,0,0,.6));
}


/* === Market & Futbolista (v23) === */
.m-tabs{display:flex;gap:6px;margin-bottom:12px;background:rgba(0,0,0,.35);border:1px solid rgba(57,255,136,.18);border-radius:14px;padding:4px}
.m-tab{flex:1;padding:8px 4px;font-family:"Oswald";font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--fm-text-dim);border-radius:10px;transition:.2s;cursor:pointer;background:none;border:none}
.m-tab.active{background:linear-gradient(180deg,rgba(57,255,136,.25),rgba(29,90,42,.4));color:var(--fm-cyan);box-shadow:inset 0 0 0 1px rgba(57,255,136,.35)}
.m-panel{display:none}
.m-panel.active{display:block;animation:fadeIn .2s}
.shop-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px;max-height:380px;overflow-y:auto;padding-right:4px}
.shop-grid::-webkit-scrollbar{width:6px}
.shop-grid::-webkit-scrollbar-thumb{background:rgba(57,255,136,.25);border-radius:4px}
.shop-card{background:linear-gradient(180deg,rgba(21,36,25,.75),rgba(7,13,9,.9));border:1px solid rgba(57,255,136,.22);border-radius:16px;padding:10px 8px;text-align:center;position:relative;transition:.2s}
.shop-card:hover{transform:translateY(-2px);border-color:var(--fm-gold);box-shadow:0 6px 18px rgba(244,197,66,.2)}
.shop-card.free{border-color:var(--fm-cyan);box-shadow:0 0 14px rgba(57,255,136,.25)}
.shop-card.elite{border-color:var(--fm-gold);box-shadow:0 0 14px rgba(244,197,66,.3)}
.shop-card .av{width:54px;height:54px;border-radius:50%;margin:0 auto 6px;background:linear-gradient(135deg,rgba(57,255,136,.3),rgba(29,90,42,.5));border:1px solid rgba(57,255,136,.4);display:flex;align-items:center;justify-content:center;font-size:24px}
.shop-card .nm{font-family:"Oswald";font-size:12px;font-weight:600;color:var(--fm-text);letter-spacing:.04em;line-height:1.1;min-height:26px;display:flex;align-items:center;justify-content:center}
.shop-card .tg{font-size:9px;letter-spacing:.12em;color:var(--fm-text-dim);text-transform:uppercase;margin-top:3px}
.shop-card .pr{margin-top:6px;font-family:"Oswald";font-size:13px;font-weight:700;color:var(--fm-gold)}
.shop-card .pr small{font-size:9px;color:var(--fm-cyan);letter-spacing:.1em;margin-left:3px}
.shop-card .free-tag{font-family:"Oswald";font-size:12px;font-weight:700;color:var(--fm-cyan);margin-top:6px;letter-spacing:.1em}

/* Futbolista slots */
.slot-area{background:linear-gradient(180deg,rgba(21,36,25,.65),rgba(7,13,9,.85));border:1px solid rgba(57,255,136,.22);border-radius:18px;padding:12px;margin-bottom:12px}
.slot-area .lbl{font-family:"Oswald";font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--fm-cyan);margin-bottom:8px;text-align:center}
.assign-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:8px}
.assign-slot{aspect-ratio:1;border:1.5px dashed rgba(57,255,136,.35);border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:rgba(0,0,0,.25);color:var(--fm-text-dim);font-size:10px;letter-spacing:.1em;text-transform:uppercase}
.assign-slot .ic{font-size:22px;opacity:.6}
.main-slot{aspect-ratio:1;max-width:120px;margin:0 auto;border:2px dashed rgba(244,197,66,.4);border-radius:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.3);color:var(--fm-text-dim);font-size:11px;letter-spacing:.1em;text-transform:uppercase;text-align:center;padding:6px}
.main-slot .ic{font-size:34px;opacity:.5;margin-bottom:4px}
.slots-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:8px}
.nft-slot{aspect-ratio:1;border:1px dashed rgba(57,255,136,.25);border-radius:10px;background:rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;color:rgba(122,151,133,.5);font-size:16px}
.nft-slot.filled{border-style:solid;border-color:var(--fm-gold);background:linear-gradient(135deg,rgba(244,197,66,.15),rgba(29,90,42,.3));color:var(--fm-gold)}
.nft-info{display:flex;justify-content:space-around;padding:8px 0;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--fm-text-dim);text-align:center}
.nft-info b{display:block;font-family:"Oswald";font-size:14px;color:var(--fm-text)}
.nft-bar{height:6px;background:rgba(0,0,0,.4);border-radius:99px;overflow:hidden;border:1px solid rgba(57,255,136,.2);margin:4px 0 8px}
.nft-bar > span{display:block;height:100%;background:linear-gradient(90deg,var(--fm-cyan),var(--fm-gold))}



/* Oculta el chip duplicado de wallet: TonConnect ya muestra la wallet. */

/* Imágenes reales de NFT/Product cards en Market: completas, sin círculo ni marco interno */
.shop-card .av{
  width:100%;height:138px;margin:0 auto 8px;padding:0;

}

.inventory-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;max-height:390px;overflow:auto;padding-right:4px;margin-bottom:12px}

.inventory-card span{display:inline-flex;margin-top:4px;font-family:"Oswald";font-size:11px;color:#1a1003;background:linear-gradient(180deg,var(--fm-gold-soft),var(--fm-gold));border-radius:999px;padding:2px 8px}

/* Inventario NFT conectado: selección, complementos, durabilidad */
.player-strip,.equip-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;max-height:390px;overflow:auto;padding-right:4px;margin-bottom:12px}

.nft-actions{display:flex;gap:6px;margin-top:6px;justify-content:center}.mini-cta{font-family:"Oswald";font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:#1a1003;background:linear-gradient(180deg,var(--fm-gold-soft),var(--fm-gold));border-radius:999px;padding:5px 9px}.mini-cta.ghost{background:rgba(0,0,0,.35);color:var(--fm-cyan);border:1px solid rgba(57,255,136,.3)}
.selected-player-box{text-align:center;margin-bottom:12px}.selected-player-box img{width:100%;max-height:210px;object-fit:contain;filter:drop-shadow(0 14px 20px rgba(0,0,0,.68))}.selected-player-box b{display:block;font-family:"Oswald";font-size:16px;color:var(--fm-gold)}.selected-player-box span{font-size:11px;color:var(--fm-cyan);letter-spacing:.12em;text-transform:uppercase}
.equipped-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}.equipped-slot{text-align:center;color:var(--fm-text-dim);font-size:10px;letter-spacing:.08em}.equipped-slot img{width:100%;height:92px;object-fit:contain;display:block;filter:drop-shadow(0 8px 12px rgba(0,0,0,.55))}.equipped-slot b{display:block;font-family:"Oswald";font-size:10px;color:var(--fm-text);line-height:1.1}

.player-card{cursor:pointer;transition:transform .15s,opacity .15s;border-radius:14px;padding:6px}
.player-card:hover{transform:translateY(-2px)}
.player-card.exhausted{opacity:.45;filter:grayscale(.7)}


/* Inputs corregidos retiro/deposito */

button:disabled{opacity:.55;cursor:not-allowed;filter:grayscale(.25)}

/* ===== FUTMUNDI top bar + professional floating side icons ===== */
.header{justify-content:center!important;position:relative!important;padding-top:7px!important}
.header .statusbar{margin:0 auto!important;text-align:center;justify-content:center!important}
.header .close{position:absolute!important;right:8px!important;top:5px!important}
.chips{position:relative!important;display:flex!important;align-items:center!important;justify-content:flex-start!important;padding-top:2px!important}
.chips #ton-connect{margin-left:auto!important;margin-right:2px!important;transform:scale(.78)!important;transform-origin:right center!important;max-width:150px!important;overflow:visible!important}
.chips #admin-chip{margin-left:4px!important}

/* Side buttons: no labels, no boxes, real-color floating icons */
.rail .icon-btn{width:42px!important;min-height:42px!important;align-items:center!important;justify-content:center!important}
.rail .icon-btn .lbl{display:none!important}
.rail .icon-btn .glyph{
  width:40px!important;height:40px!important;
  background:transparent!important;border:0!important;box-shadow:none!important;
  display:flex!important;align-items:center!important;justify-content:center!important;
  filter:drop-shadow(0 2px 1px rgba(0,0,0,.8)) drop-shadow(0 9px 10px rgba(0,0,0,.72))!important;
}
.rail .icon-btn .glyph svg{display:none!important}
.rail .icon-btn .glyph::before{
  display:block;
  font-family:"Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif;
  font-size:30px;line-height:1;
  transform:translateZ(0);
  transition:transform .18s ease, filter .18s ease;
}
.rail .icon-btn:hover .glyph::before{transform:scale(1.12) translateY(-1px)}
.rail .icon-btn[data-modal="logros"] .glyph::before{content:"🏆";filter:drop-shadow(0 0 10px rgba(244,197,66,.55)) drop-shadow(0 0 18px rgba(255,226,122,.28))}
.rail .icon-btn[data-modal="goles"] .glyph::before{content:"⚽";filter:drop-shadow(0 0 9px rgba(255,255,255,.38)) drop-shadow(0 0 14px rgba(57,255,136,.20))}
.rail .icon-btn[data-modal="reclamos"] .glyph::before{content:"🎁";filter:drop-shadow(0 0 10px rgba(255,90,60,.38)) drop-shadow(0 0 16px rgba(244,197,66,.25))}
.rail .icon-btn[data-modal="nivel"] .glyph::before{content:"⭐";filter:drop-shadow(0 0 10px rgba(244,197,66,.48)) drop-shadow(0 0 16px rgba(57,255,136,.16))}
.rail .icon-btn[data-modal="deposito"] .glyph::before{content:"💎";filter:drop-shadow(0 0 10px rgba(63,191,255,.72)) drop-shadow(0 0 18px rgba(63,191,255,.36))}
.rail .icon-btn[data-modal="torneo"] .glyph::before{content:"🏆";filter:drop-shadow(0 0 10px rgba(244,197,66,.55)) drop-shadow(0 0 18px rgba(57,255,136,.18))}
.rail .icon-btn[data-modal="retiro"] .glyph::before{content:"💸";filter:drop-shadow(0 0 10px rgba(57,255,136,.48)) drop-shadow(0 0 16px rgba(255,255,255,.18))}
.rail .icon-btn[data-modal="referido"] .glyph::before{content:"👥";filter:drop-shadow(0 0 10px rgba(57,255,136,.45)) drop-shadow(0 0 16px rgba(63,191,255,.22))}
.rail .icon-btn .badge{font-size:8px!important;right:-3px!important;top:-4px!important;box-shadow:0 0 10px rgba(255,90,60,.55)!important}

@media (max-width:420px){
  .chips #ton-connect{transform:scale(.72)!important;max-width:135px!important}
  .rail .icon-btn .glyph::before{font-size:28px}
}


/* ===== FORCE REAL SIDE ICONS - no SVG, no labels, no boxes ===== */
.stage .rail .icon-btn{width:42px!important;min-height:42px!important;background:transparent!important;border:0!important;box-shadow:none!important;padding:0!important}
.stage .rail .icon-btn .lbl{display:none!important}

  width:40px!important;height:40px!important;background:transparent!important;border:0!important;box-shadow:none!important;
  display:flex!important;align-items:center!important;justify-content:center!important;color:initial!important;
  filter:drop-shadow(0 2px 1px rgba(0,0,0,.85)) drop-shadow(0 8px 9px rgba(0,0,0,.74))!important;
}
.stage .rail .icon-btn .glyph svg{display:none!important;visibility:hidden!important;width:0!important;height:0!important}
.stage .rail .icon-btn .glyph .real-ico{

}
.stage .rail .icon-btn[data-modal="logros"] .real-ico,
.stage .rail .icon-btn[data-modal="torneo"] .real-ico{filter:drop-shadow(0 0 9px rgba(244,197,66,.60)) drop-shadow(0 0 16px rgba(255,226,122,.28))}
.stage .rail .icon-btn[data-modal="goles"] .real-ico{filter:drop-shadow(0 0 9px rgba(255,255,255,.42)) drop-shadow(0 0 16px rgba(57,255,136,.18))}

.stage .rail .icon-btn[data-modal="deposito"] .real-ico{filter:drop-shadow(0 0 10px rgba(63,191,255,.78)) drop-shadow(0 0 18px rgba(63,191,255,.38))}
.stage .rail .icon-btn[data-modal="retiro"] .real-ico{filter:drop-shadow(0 0 10px rgba(57,255,136,.52)) drop-shadow(0 0 16px rgba(255,255,255,.20))}
.stage .rail .icon-btn[data-modal="referido"] .real-ico{filter:drop-shadow(0 0 10px rgba(57,255,136,.48)) drop-shadow(0 0 16px rgba(63,191,255,.25))}
.stage .rail .icon-btn:hover .real-ico{transform:scale(1.13) translateY(-1px)!important}


/* ===== FIX duplicate side icons: disable old pseudo emoji layer ===== */
.stage .rail .icon-btn .glyph::before,
.stage .rail .icon-btn[data-modal="logros"] .glyph::before,
.stage .rail .icon-btn[data-modal="goles"] .glyph::before,
.stage .rail .icon-btn[data-modal="reclamos"] .glyph::before,
.stage .rail .icon-btn[data-modal="nivel"] .glyph::before,
.stage .rail .icon-btn[data-modal="deposito"] .glyph::before,
.stage .rail .icon-btn[data-modal="torneo"] .glyph::before,
.stage .rail .icon-btn[data-modal="retiro"] .glyph::before,
.stage .rail .icon-btn[data-modal="referido"] .glyph::before{

  display:none!important;
  visibility:hidden!important;

  <div class="stage">

        <span class="glyph">
          <svg viewBox="0 0 24 24">
            <path d="M7 4h10v3.5a5 5 0 0 1-10 0V4Z"/>
            <path d="M17 5.5h3v1.5a3 3 0 0 1-3 3"/>

const FREE_NFT_NAME = 'Neymar';
const FREE_NFT_LIFETIME_MS = 15 * 24 * 60 * 60 * 1000;
const FREE_NFT_USD_CAP = 5;
const EQUIP_SLOT = { uniforms:'uniform', shoes:'shoes', dt:'dt' };

function itemCategory(name){
  if(window.NFT_CONFIG.players[name]) return 'players';
  if(window.NFT_CONFIG.uniforms[name]) return 'uniforms';
  if(window.NFT_CONFIG.shoes[name]) return 'shoes';
  if(window.NFT_CONFIG.dt[name]) return 'dt';
  return 'misc';
}
// FIX: ITEM_PRICES construido dinámicamente desde NFT_CONFIG.
const ITEM_PRICES = Object.fromEntries([].concat(Object.entries(window.NFT_CONFIG.players),Object.entries(window.NFT_CONFIG.uniforms),Object.entries(window.NFT_CONFIG.shoes),Object.entries(window.NFT_CONFIG.dt)).map(([k,v])=>[k,Number(v.price)||0]));
function uid(prefix){ return prefix + '_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,8); }
function nftValueUSDT(name){ 
  const config = window.NFT_CONFIG.players[name] || window.NFT_CONFIG.uniforms[name] || window.NFT_CONFIG.shoes[name] || window.NFT_CONFIG.dt[name];

}

// Poder de Mina / OVR: rating visible de cada Futbolista NFT calculado con
// su generación diaria de gemas y su valor en Market. Escala 48-99.
function getComplementBoostPercent(item){
  if(!item || !item.name || !item.category) return 0;
  const cfgGroup = item.category === 'uniforms' ? window.NFT_CONFIG?.uniforms
    : item.category === 'shoes' ? window.NFT_CONFIG?.shoes
    : item.category === 'dt' ? window.NFT_CONFIG?.dt
    : null;
  const cfg = cfgGroup ? cfgGroup[item.name] : null;
  const boostText = String(cfg?.boost || '');
  const num = Number((boostText.match(/(\d+(?:\.\d+)?)/) || [0,0])[1]) || 0;

  // Referencias existentes:
  // Uniformes vienen como +1000/+1500/+3000/+4000 Físico → equivalen a +10/+15/+30/+40% de boost OVR.
  // Zapatillas y DT ya vienen expresados como +15/+35/+45/+65%.
  if(item.category === 'uniforms') return +(num / 100).toFixed(2);
  return num;
}
function getEquipmentMiningBoost(player){
  if(!player || itemCategory(player.name) !== 'players') return { percent:0, ovrBoost:0, dailyBonus:0, details:[], equipped:{} };
  const equipped = getEquippedItems(player);
  const items = [equipped.uniform, equipped.shoes, equipped.dt].filter(Boolean);
  const details = items.map(item => ({ name:item.name, category:item.category, percent:getComplementBoostPercent(item) })).filter(x => x.percent > 0);
  const percent = +details.reduce((n,x)=>n+x.percent,0).toFixed(2);
  return { percent, ovrBoost:0, dailyBonus:0, details, equipped };
}
function getPlayerMiningStats(name, player=null){
  const players = window.NFT_CONFIG?.players || {};
  const cfg = players[name];
  if(!cfg) return null;

  const entries = Object.entries(players).map(([playerName, data]) => {
    const daily = Number(data.dailyGems || 0);
    const price = Number(data.price || 0);
    // Se usa log para que Cristiano no aplaste a los rangos medios y el ranking
    // siga siendo proporcional a producción + valor de inversión.
    const score = Math.log1p(daily) * 0.72 + Math.log1p(price) * 0.28;
    return { name: playerName, score };
  }).sort((a,b) => a.score - b.score);

  const rank = Math.max(0, entries.findIndex(x => x.name === name));
  const maxRank = Math.max(1, entries.length - 1);
  const baseOvr = Math.round(48 + (rank / maxRank) * 51);
  const equip = player ? getEquipmentMiningBoost(player) : { percent:0, details:[] };

  // El porcentaje de equipo incrementa el OVR de Mina, pero con coeficiente arcade
  // para mantener progresión balanceada: bonusOVR = baseOVR * (% equipo) * 20%.
  // Cap superior 125 para que incluso los Leyenda puedan subir si tienen anexos.
  const ovrBoost = Math.max(0, Math.round(baseOvr * (Number(equip.percent || 0) / 100) * 0.20));
  const ovr = Math.min(125, baseOvr + ovrBoost);

  const dailyGems = Number(cfg.dailyGems || 0);
  const effectiveDailyGems = +(dailyGems * (1 + (Number(equip.percent || 0) / 100) * 0.20)).toFixed(2);
  const priceGems = Number(cfg.price || 0);
  const valueUSDT = +(priceGems / (window.STATE?.gemsPerUSDT || 32)).toFixed(2);
  const roiDays = Number(cfg.roiDays || (dailyGems > 0 && priceGems > 0 ? priceGems / dailyGems : 0));
  const mineUSDPerDay = +(effectiveDailyGems / (window.STATE?.gemsPerUSDT || 32)).toFixed(2);
  let tier = 'Bronce', cls = 'bronze';
  if(ovr >= 115){ tier = 'Mítico'; cls = 'legend'; }
  else if(ovr >= 100){ tier = 'Leyenda+'; cls = 'legend'; }
  else if(ovr >= 96){ tier = 'Leyenda'; cls = 'legend'; }
  else if(ovr >= 90){ tier = 'Diamante'; cls = 'diamond'; }
  else if(ovr >= 82){ tier = 'Élite'; cls = 'elite'; }
  else if(ovr >= 74){ tier = 'Pro'; cls = 'pro'; }
  else if(ovr >= 64){ tier = 'Oro'; cls = 'gold'; }
  else if(ovr >= 55){ tier = 'Plata'; cls = 'silver'; }
  return {
    ovr, baseOvr, ovrBoost, tier, cls,
    dailyGems, effectiveDailyGems, priceGems, valueUSDT, roiDays, mineUSDPerDay,
    equipmentBoostPercent: Number(equip.percent || 0), equipmentDetails: equip.details || []
  };
}
function miningOVRBadgeHTML(name, compact=false, player=null){
  const st = getPlayerMiningStats(name, player);
  if(!st) return '';
  const daily = Number(st.effectiveDailyGems || st.dailyGems || 0).toLocaleString('es-ES', { maximumFractionDigits: 1 });
  const price = Number(st.priceGems || 0).toLocaleString('es-ES');
  const boostLabel = st.ovrBoost > 0 ? ` +${st.ovrBoost}` : '';
  const eqLabel = st.equipmentBoostPercent > 0 ? ` · Eq +${st.equipmentBoostPercent}%` : '';
  if(compact){
    return `<div class="player-ovr-pill ${st.cls}"><b>OVR ${st.ovr}${boostLabel ? `<em>${boostLabel}</em>` : ''}</b><span>${daily} 💎/día</span></div>`;
  }

}
function syncMiningStatsOnItem(item){

  const category = itemCategory(name);
  const item = { id: uid(category), name, category, img: MARKET_IMAGE_MAP[name], createdAt: Date.now() };
  if(category === 'players'){

function setupFreeNft(item){
  if(!item || item.name !== FREE_NFT_NAME) return;
  item.freeTrial = true;
  item.createdAt = Number(item.createdAt || Date.now());
  item.expiresAt = Number(item.expiresAt || (item.createdAt + FREE_NFT_LIFETIME_MS));
  item.earnedUsd = Number(item.earnedUsd || 0);
  item.earnedUsdCap = Number(item.earnedUsdCap || FREE_NFT_USD_CAP);
}
function freeNftStatus(player){
  if(!player || player.name !== FREE_NFT_NAME) return null;
  setupFreeNft(player);
  const remainingMs = Math.max(0, player.expiresAt - Date.now());
  const days = Math.ceil(remainingMs / 86400000);
  const earned = Number(player.earnedUsd || 0);
  const cap = Number(player.earnedUsdCap || FREE_NFT_USD_CAP);
  return { days, earned, cap, expired: remainingMs <= 0, capped: earned >= cap, destroyed: remainingMs <= 0 || earned >= cap };
}
function playerStatusText(player){
  if(player?.name === FREE_NFT_NAME){
    const st = freeNftStatus(player);
    const cls = (st.days <= 3 || st.earned >= st.cap) ? 'dur-low' : 'dur-ok';
    const mine = getPlayerMiningStats(player.name, player);
    return { cls, text: `${mine ? 'OVR '+mine.ovr+' · ' : ''}Gratis · ${Math.max(0, st.days)} días · $${st.earned.toFixed(2)}/$${st.cap}` };
  }
  const mine = getPlayerMiningStats(player?.name, player);
  return { cls: player.durability <= 20 ? 'dur-low' : 'dur-ok', text: `${mine ? 'OVR '+mine.ovr+' · ' : ''}Dur. ${player.durability.toFixed(1)}% · ⚽ ${player.stamina}/${player.maxStamina}` };

function normalizeOwnedInventory(){
  if(!STATE) return;
  ensureInventoryShape();
  // Limpia duplicados del NFT gratis y límites de 20 por nombre.
  ['players','uniforms','shoes','dt'].forEach(cat => {
    const counts = {};
    STATE.inventory[cat] = STATE.inventory[cat].filter(item => {
      if(!item || !item.name || !MARKET_IMAGE_MAP[item.name]) return false;
      const max = item.name === FREE_NFT_NAME ? 1 : (STATE.maxPerNFT || 20);
      counts[item.name] = (counts[item.name] || 0) + 1;
      if(counts[item.name] > max) return false;
      item.category = cat;
      item.img = MARKET_IMAGE_MAP[item.name];
      if(cat === 'players'){
        item.durability = Math.max(0, Math.min(100, Number(item.durability ?? 100)));
        item.stamina = Math.max(0, Math.min(Number(item.maxStamina || 4), Number(item.stamina ?? 4)));
        item.maxStamina = Number(item.maxStamina || 4);
        item.level = Number(item.level || 1);
        item.exp = Number(item.exp || 0);
        item.equipped = item.equipped || { uniform:null, shoes:null, dt:null };
        syncMiningStatsOnItem(item);
        if(item.name === FREE_NFT_NAME){
          setupFreeNft(item);
          if(freeNftStatus(item).destroyed) return false;
        }
      }
      return true;
    });
  });
}

  // Migración: si hay compras antiguas por contador, crea instancias NFT reales.
  if(totalInv === 0 && STATE.owned && Object.keys(STATE.owned).length){

      const cat = itemCategory(name); if(cat === 'misc') return;
      const max = name === FREE_NFT_NAME ? 1 : (STATE.maxPerNFT || 20);

async function payUsdtJetton(kind, usdt, gems=0){
  if(!window.tonConnectUI){ toast('TON Connect no está disponible', false); return false; }
  if(!STATE.tonWallet){
    toast('Conecta tu wallet para pagar', false);
    try { window.tonConnectUI.openModal(); } catch(e) {}

  }
  if(!STATE.adminApiBase){ toast('Backend Render no configurado', false); return false; }
  try{
    const res = await fetch(STATE.adminApiBase + '/api/payments/usdt-order', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ address: STATE.tonWallet, amountUsdt: Number(usdt), gems: Number(gems||0), kind })
    });
    const raw = await res.text();
    let data;
    try { data = JSON.parse(raw); }
    catch(e){ throw new Error('Backend Render no devolvió JSON. Revisa que Render redeployó server.js y que la URL API apunta a Render.'); }
    if(!res.ok || !data.ok) throw new Error(data.error || 'No se pudo crear orden USDT');

    toast('Pago USDT enviado. Esperando confirmación blockchain.', true);

  }catch(e){

function escapeHTML(value){
  return String(value).replace(/[&<>'"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch]));
}

function copyText(text){
  if(navigator.clipboard && window.isSecureContext){
    return navigator.clipboard.writeText(text);
  }
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.setAttribute('readonly','');
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try{ document.execCommand('copy'); } finally { ta.remove(); }
  return Promise.resolve();
}

function isValidTonAddress(addr){
  if(!addr) return false;
  const a = String(addr).trim();
  // User-friendly TON address (EQ/UQ...) or raw address from TonConnect (0:<64 hex>, -1:<64 hex>)
  return /^([UE]Q)[A-Za-z0-9_-]{46,}$/.test(a) || /^-?\d+:[a-fA-F0-9]{64}$/.test(a);
}

function getUtcWeekIdentifier(){
  const d = new Date();
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  const dayOfYear = Math.floor((d - yearStart) / 86400000);
  const week = Math.ceil((dayOfYear + yearStart.getUTCDay() + 1) / 7);
  return d.getUTCFullYear() + 'W' + week;
}

async function adminFetch(path, options = {}){
  if(!hasAdminApi()) throw new Error('Admin API no configurada');
  const headers = Object.assign({'Content-Type':'application/json'}, options.headers || {});
  if(STATE.adminToken) headers.Authorization = 'Bearer ' + STATE.adminToken;
  const res = await fetch(STATE.adminApiBase + path, Object.assign({}, options, {headers}));
  let data = null;
  try { data = await res.json(); } catch(e) { data = {}; }
  if(!res.ok || data.ok === false){
    throw new Error(data.error || ('HTTP ' + res.status));
  }
  return data;
}

async function prepareTonProofRequest(tcUI){
  if(!hasAdminApi() || !tcUI || typeof tcUI.setConnectRequestParameters !== 'function') return;
  try{
    tcUI.setConnectRequestParameters({ state: 'loading' });
    const data = await adminFetch('/api/admin/payload', { method:'GET' });
    if(data.payload){
      tcUI.setConnectRequestParameters({
        state: 'ready',
        value: { tonProof: data.payload }
      });
    } else {
      try { tcUI.setConnectRequestParameters({ state: 'ready', value: {} }); } catch(_) {}
    }
  }catch(e){
    console.warn('No se pudo preparar TON proof admin:', e.message);
    try { tcUI.setConnectRequestParameters({ state: 'ready', value: {} }); } catch(_) {}
  }
}

async function refreshAdminStatus(){
  if(!hasAdminApi() || !STATE.adminToken) { updateAdminChip(); return; }
  try{
    const data = await adminFetch('/api/admin/status', { method:'GET' });
    STATE.isAdminVerified = !!data.admin;
    if(!STATE.isAdminVerified) localStorage.removeItem('fm_admin_token');
    updateAdminChip();
  }catch(e){
    console.warn('Sesión admin inválida:', e.message);
    clearAdminSession();
  }
}

async function verifyTonProof(wallet){
  if(!hasAdminApi() || !wallet || !wallet.account) return;
  const tonProof = wallet.connectItems && wallet.connectItems.tonProof;
  if(!tonProof || tonProof.name === 'ton_proof_error'){
    await refreshAdminStatus();
    return;
  }
  try{
    const data = await adminFetch('/api/admin/verify', {
      method: 'POST',
      body: JSON.stringify({
        address: wallet.account.address,
        network: wallet.account.chain,
        publicKey: wallet.account.publicKey,
        proof: tonProof.proof || tonProof
      })
    });
    if(data.admin && data.token){
      setAdminSession(data.token);
      toast('Admin verificado', true);
    } else {
      clearAdminSession();
    }
  }catch(e){
    console.warn('No se pudo verificar admin:', e.message);
    clearAdminSession();
    // Prepara un nuevo payload para el próximo intento de conexión.
    if(window.tonConnectUI) prepareTonProofRequest(window.tonConnectUI);
  }
}

      const v = parseInt(String(amt.value).replace(/[^0-9]/g,''))||0;
      const recv = v>0 ? Math.max(0, Math.floor(v*0.95 - 32)) : 0;
      net.textContent = v>0 ? `Descuento: ${Math.floor(v*0.05)} 💎 + 32 💎 · Recibes: ${recv} 💎 = ${(recv/STATE.gemsPerUSDT).toFixed(2)} USDT` : 'Recibirás: —';

      if(v > STATE.balanceGems){ msg.textContent=`Saldo insuficiente. Tienes ${STATE.balanceGems} 💎`; return; }
      if(cap !== a+b){ msg.textContent='Captcha incorrecto'; return; }
      try{

  if(name === 'torneo'){
    inner.querySelector('#t-status').textContent = `${STATE.tournamentUsers} / 100`;
    const btn = inner.querySelector('#t-register');
    const msg = inner.querySelector('#t-msg');
    const dep = inner.querySelector('#t-deposit');
    // Countdown to next Saturday 23:59 (close)
    function tick(){
      const now = new Date();
      const day = now.getDay(); // 0 Sun .. 6 Sat
      const target = new Date(now);
      const daysToSat = (6 - day + 7) % 7;
      target.setDate(now.getDate() + daysToSat);
      target.setHours(23,59,0,0);
      if(target <= now) target.setDate(target.getDate() + 7);
      let diff = Math.max(0, target - now);
      const d = Math.floor(diff/86400000); diff -= d*86400000;
      const h = Math.floor(diff/3600000);  diff -= h*3600000;
      const m = Math.floor(diff/60000);    diff -= m*60000;
      const s = Math.floor(diff/1000);
      const dEl=inner.querySelector('#t-d'); if(!dEl) return;
      dEl.textContent=d; inner.querySelector('#t-h').textContent=String(h).padStart(2,'0');
      inner.querySelector('#t-m').textContent=String(m).padStart(2,'0');
      inner.querySelector('#t-s').textContent=String(s).padStart(2,'0');
    }

  if(name === 'torneo'){

    inner.querySelectorAll('.shop-card').forEach(card => {
      const nm = card.querySelector('.nm')?.textContent?.trim() || 'item';

      function syncButton(){
        const have = countOwnedByName(nm);
        if(isFree){
          btn.textContent = have >= 1 ? 'Reclamado (1/1)' : 'Reclamar GRATIS';
          btn.disabled = have >= 1;

        } else {
          btn.textContent = `Comprar (${have}/${max})`;
          btn.disabled = have >= max;
        }
      }
      syncButton();
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const result = addInventoryItem(nm);
        if(!result.ok){ toast(result.error, false); syncButton(); return; }
        syncButton();
        toast(isFree ? `${nm} reclamado y enviado a Futbolista` : `Compra realizada: ${nm} · aparece en Futbolista`, true);

  }
  if(name === "reclamos"){
    const btn = inner.querySelector("#daily-claim-action-btn");
    const grid = inner.querySelector("#daily-streak-grid");
    
    // El dia oficial comienza y termina a las 00:00 UTC
    const updateDailyTime = () => {
      const nUTC = new Date();
      // Ojo: en UTC, mañana a las 00:00:00
      const tomorrowUTC = new Date(Date.UTC(nUTC.getUTCFullYear(), nUTC.getUTCMonth(), nUTC.getUTCDate() + 1, 0, 0, 0));
      let msLeft = Math.max(0, tomorrowUTC - nUTC);
      
      const hrs = Math.floor(msLeft / 3600000); msLeft -= hrs * 3600000;
      const mins = Math.floor(msLeft / 60000); msLeft -= mins * 60000;
      const secs = Math.floor(msLeft / 1000);

      const dH = inner.querySelector("#d-h"); if(!dH) return;
      dH.textContent = String(hrs).padStart(2, "0");
      inner.querySelector("#d-m").textContent = String(mins).padStart(2, "0");
      inner.querySelector("#d-s").textContent = String(secs).padStart(2, "0");
    };
    updateDailyTime();
    clearInterval(window.__fm_daily_utc_timer);
    window.__fm_daily_utc_timer = setInterval(updateDailyTime, 1000);

    // Renderizamos la racha de los 7 dias verificando en local/nube si ya reclamaron
    const renderStreakGrid = () => {
      if(!grid) return;
      const nowUTC = new Date();
      // Dia de la semana en curso (Lunes a Domingo o 1 a 7)
      let currentDayIdx = nowUTC.getUTCDay(); // 0 Sun .. 6 Sat
      currentDayIdx = currentDayIdx === 0 ? 7 : currentDayIdx; // 1 Lunes .. 7 Domingo

      // Cargamos el mapa de dias reclamados de esta semana UTC
      const mapKey = "fm_utc_daily_claimed_week_" + getUtcWeekIdentifier();
      const claimedMap = safeJSON(mapKey, {});

      let html = "";
      const prizes = ["1 💎", "2 PTS", "2 💎", "3 PTS", "3 💎", "4 PTS", "4 💎"];

      for(let d = 1; d <= 7; d++) {
        let isClaimed = !!claimedMap[d];
        let isToday = d === currentDayIdx;
        let isPast = d < currentDayIdx;

        if (isClaimed) {
          // Reclamado -> Se incrusta el grandioso Icono de Check de Marcaje (daily_check.jpg)
          html += `
            <div style="background:#0e1a12; border:1px solid #39ff88; border-radius:14px; padding:6px 4px; text-align:center; box-shadow:0 0 10px rgba(57,255,136,0.2);">
              <img src="./generated-assets/daily_check.jpg" alt="Check" style="width:100%; height:32px; object-fit:contain; border-radius:6px; margin-bottom:3px; filter:drop-shadow(0 2px 4px rgba(0,0,0,0.8));">
              <span style="display:block; font-family:'Oswald'; font-weight:900; font-size:11px; color:#39ff88; text-transform:uppercase;">✓ Listo</span>
              <span style="display:block; font-size:9px; color:#a0b4c8; margin-top:1px;">D${d}</span>
            </div>
          `;
        } else if (isPast) {
          // Si el dia paso y el usuario no reclamo, perdio ese dia
          html += `
            <div style="background:#050a07; border:1px solid #ff4545; border-radius:14px; padding:6px 4px; text-align:center; opacity:0.8;">
              <div style="font-size:24px; font-weight:900; color:#ff4545; line-height:1; height:32px; display:grid; place-items:center; margin-bottom:3px;">✕</div>
              <span style="display:block; font-family:'Oswald'; font-weight:900; font-size:10px; color:#ff4545; text-transform:uppercase;">Perdido</span>
              <span style="display:block; font-size:9px; color:#a0b4c8; margin-top:1px;">D${d}</span>
            </div>
          `;
        } else if (isToday) {
          // Hoy disponible
          html += `
            <div style="background:#1a2a1b; border:2px solid #ffe871; border-radius:14px; padding:6px 4px; text-align:center; box-shadow:0 0 15px rgba(255,232,113,0.4); transform:scale(1.03);">
              <span style="display:block; font-family:'Oswald'; font-weight:950; font-size:16px; color:#ffe871; height:32px; display:grid; place-items:center; margin-bottom:3px;">${prizes[d-1]}</span>
              <span style="display:block; font-family:'Oswald'; font-weight:950; font-size:11px; color:#ffe871;">HOY</span>
              <span style="display:block; font-size:9px; color:#39ff88; font-weight:bold; margin-top:1px;">D${d}</span>
            </div>
          `;
        } else {
          // Futuro
          html += `
            <div style="background:#070d09; border:1px solid #1e2d3d; border-radius:14px; padding:6px 4px; text-align:center; opacity:0.6;">
              <span style="display:block; font-family:'Oswald'; font-weight:700; font-size:14px; color:#f8fbff; height:32px; display:grid; place-items:center; margin-bottom:3px;">${prizes[d-1]}</span>
              <span style="display:block; font-family:'Oswald'; font-weight:700; font-size:10px; color:#a0b4c8;">Espera</span>
              <span style="display:block; font-size:9px; color:#a0b4c8; margin-top:1px;">D${d}</span>
            </div>
          `;
        }
      }
      grid.innerHTML = html;

      // Habilitamos o bloqueamos el boton de accion segun Hoy
      if (claimedMap[currentDayIdx]) {
        if(btn) {
          btn.disabled = true;
          btn.textContent = "✔ CHECK DEL DÍA OFICIAL REALIZADO";
          btn.style.background = "#0e1a12"; btn.style.borderColor = "#39ff88"; btn.style.color = "#39ff88";
        }
      } else {
        if(btn) {
          btn.disabled = false;
          btn.textContent = "✔ HACER CHECK-IN & RECLAMAR DÍA " + currentDayIdx;
          btn.style.background = "var(--fm-cyan)"; btn.style.borderColor = "#fff"; btn.style.color = "#000";
        }
      }

      // Progresos mes
      const totalClaimedMonth = Object.values(claimedMap).filter(Boolean).length;
      const mBar = inner.querySelector("#daily-month-bar");
      if(mBar) mBar.style.width = Math.round((totalClaimedMonth / 30) * 100) + "%";
      const mTxt = inner.querySelector("#daily-month-txt");
      if(mTxt) mTxt.textContent = totalClaimedMonth + " / 30 Días UTC Activos";
    };
    
    renderStreakGrid();

    if(btn) {
      btn.onclick = () => {
        const nowUTC = new Date();
        let currentDayIdx = nowUTC.getUTCDay();
        currentDayIdx = currentDayIdx === 0 ? 7 : currentDayIdx;
        
        const mapKey = "fm_utc_daily_claimed_week_" + getUtcWeekIdentifier();
        const claimedMap = safeJSON(mapKey, {});

        if (claimedMap[currentDayIdx]) {
          toast("El check de Hoy (00:00 UTC) ya se ejecutó con éxito.", false);
          return;
        }

        claimedMap[currentDayIdx] = true;
        localStorage.setItem(mapKey, JSON.stringify(claimedMap));
        
        // Sumamos las gemas
        const gGana = currentDayIdx % 2 !== 0 ? Math.ceil(currentDayIdx / 2) * 2 : 2;
        STATE.balanceGems += gGana;
        updateHeaderStats();
        
        renderStreakGrid();
        toast("✅ ¡Maravilloso! +" + gGana + " Gemas reclamadas. Racha en disco verificada y guardada.", true);
      };
    }
  }
  if(name === 'logros'){
    const btn = inner.querySelector('.m-cta');
    if(btn){ btn.dataset.action = 'claim-achievements'; btn.addEventListener('click', () => claimAchievements(btn)); }
  }
  if(name === 'goles'){
    const btn = inner.querySelector('.m-cta');
    if(btn){ btn.dataset.action = 'claim-goals'; btn.addEventListener('click', () => claimGoals(btn)); }
  }
  if(name === 'ranking-tab'){
    loadRankingPanel();
  }
  if(name === 'nivel'){
    updateHeaderStats({ level: getSelectedPlayer()?.level || 1 });
  }
  // Evita botones sin respuesta: toda CTA sin lógica propia informa estado backend.
  inner.querySelectorAll('.m-cta:not([id]):not([data-action])').forEach(btn => {
    if(btn.dataset.wiredGeneric) return;
    btn.dataset.wiredGeneric = '1';
    btn.addEventListener('click', () => toast('Función pendiente de conectar al backend', false));
  });



}

function adminMoney(v){ return Number(v || 0).toLocaleString(undefined, { maximumFractionDigits: 2 }); }
function adminShort(v){ v = String(v || ''); return v.length > 18 ? v.slice(0,8)+'…'+v.slice(-6) : v; }
function adminSetContent(html){ const c = inner.querySelector('#admin-content'); if(c) c.innerHTML = html; }
function adminLoading(label='Cargando...'){ adminSetContent(`<div class="m-warn" style="background:rgba(57,255,136,.08);border-color:rgba(57,255,136,.25);color:var(--fm-cyan)">${label}</div>`); }
function adminError(e){ adminSetContent(`<div class="m-warn">${escapeHTML(e.message || e)}</div>`); }
function adminTabsHTML(active='users'){
  const tabs = [['users','Wallets'],['deposits','Depósitos'],['withdrawals','Retiros'],['gifts','Regalar']];
  return `<div class="m-tabs" data-tabs="admin">${tabs.map(([id,label]) => `<button class="m-tab ${id===active?'active':''}" type="button" data-admin-view="${id}">${label}</button>`).join('')}</div><div id="admin-content"></div>`;
}
function wireAdminTabs(){
  inner.querySelectorAll('[data-admin-view]').forEach(btn => btn.addEventListener('click', () => {
    inner.querySelectorAll('[data-admin-view]').forEach(b => b.classList.toggle('active', b === btn));
    const view = btn.dataset.adminView;
    if(view === 'users') return adminLoadUsers();
    if(view === 'deposits') return adminLoadDeposits();
    if(view === 'withdrawals') return adminLoadWithdrawals();
    if(view === 'gifts') return adminLoadGifts();
  }));
}
function openAdminPanel(){
  if(!isAdmin()){ toast('Admin no verificado. Conecta la wallet admin.', false); return; }
  clearActiveTimers();
  lastFocusedEl = document.activeElement;
  inner.innerHTML = `
    <div class="modal-head">
      <div class="modal-title" id="fm-modal-title">Panel Admin</div>
      <button class="modal-close" type="button" aria-label="Cerrar">×</button>
    </div>
    <div class="m-broadcast-bar"><span class="live">ADMIN</span><span class="sep"></span><span>FUTMUNDI backend</span></div>
    ${adminTabsHTML('users')}`;
  backdrop.classList.add('open');
  document.body.style.overflow = 'hidden';
  inner.querySelector('.modal-close').addEventListener('click', closeModal);
  wireAdminTabs();
  adminLoadUsers();
  requestAnimationFrame(() => inner.querySelector('.modal-close')?.focus());
}
async function adminLoadUsers(q=''){
  adminLoading('Cargando wallets...');
  try{
    const data = await adminFetch('/api/admin/users' + (q ? '?q=' + encodeURIComponent(q) : ''), { method:'GET' });
    adminSetContent(`
      <div class="admin-toolbar">
        <input id="admin-user-q" class="m-input" placeholder="Buscar wallet o referido" value="${escapeHTML(q)}">
        <button class="admin-btn" id="admin-user-search" type="button">Buscar</button>
      </div>
      <div class="admin-list">${(data.users || []).map(u => `
        <div class="admin-row">
          <div class="admin-pill">${Number(u.gems || 0).toLocaleString()} 💎</div>
          <div class="meta"><b>${escapeHTML(u.wallet_address || '')}</b><span>Ref: ${escapeHTML(u.ref_code || '-')} · NFTs: ${u.nft_count || 0} · Locked: ${u.locked_gems || 0} 💎</span></div>
          <div class="admin-actions"><button class="admin-btn ghost" data-fill-wallet="${escapeHTML(u.wallet_address || '')}" type="button">Usar</button></div>
        </div>`).join('') || '<div class="empty-inventory">Sin usuarios todavía.</div>'}</div>`);
    inner.querySelector('#admin-user-search')?.addEventListener('click', () => adminLoadUsers(inner.querySelector('#admin-user-q')?.value.trim() || ''));
    inner.querySelector('#admin-user-q')?.addEventListener('keydown', e => { if(e.key === 'Enter') adminLoadUsers(e.target.value.trim()); });
    inner.querySelectorAll('[data-fill-wallet]').forEach(b => b.addEventListener('click', () => { navigator.clipboard?.writeText(b.dataset.fillWallet); toast('Wallet copiada', true); }));
  }catch(e){ adminError(e); }
}
async function adminLoadDeposits(){
  adminLoading('Cargando depósitos pendientes...');
  try{
    const data = await adminFetch('/api/admin/deposits?status=pending', { method:'GET' });
    adminSetContent(`<div class="admin-list">${(data.deposits || []).map(d => `
      <div class="admin-row">
        <div class="admin-pill">${adminMoney(d.amount_usdt)} USDT</div>
        <div class="meta"><b>${escapeHTML(d.wallet_address)}</b><span>${d.gems} 💎 · ${new Date(d.created_at).toLocaleString()} · Order: ${adminShort(d.payment_order_id)}</span></div>
        <div class="admin-actions"><button class="admin-btn" data-confirm-deposit="${d.id}" type="button">Confirmar</button></div>
      </div>`).join('') || '<div class="empty-inventory">No hay depósitos pendientes.</div>'}</div>`);
    inner.querySelectorAll('[data-confirm-deposit]').forEach(btn => btn.addEventListener('click', async () => {
      const txHash = prompt('TX hash de confirmación (opcional):') || '';
      try{ await adminFetch('/api/admin/deposits/confirm', { method:'POST', body: JSON.stringify({ depositId: btn.dataset.confirmDeposit, txHash }) }); toast('Depósito confirmado', true); adminLoadDeposits(); }
      catch(e){ toast(e.message, false); }
    }));
  }catch(e){ adminError(e); }
}
async function adminLoadWithdrawals(){
  adminLoading('Cargando retiros pendientes...');
  try{
    const [pendingRes, approvedRes] = await Promise.allSettled([
      adminFetch('/api/admin/withdrawals?status=pending', { method:'GET' }),
      adminFetch('/api/admin/withdrawals?status=approved', { method:'GET' })
    ]);
    const withdrawals = [];
    if(pendingRes.status === 'fulfilled') withdrawals.push(...(pendingRes.value.withdrawals || []));
    if(approvedRes.status === 'fulfilled') withdrawals.push(...(approvedRes.value.withdrawals || []));
    const seenWd = new Set();
    const uniqueWithdrawals = withdrawals.filter(w => { if(seenWd.has(w.id)) return false; seenWd.add(w.id); return true; });
    adminSetContent(`<div class="admin-list">${uniqueWithdrawals.map(w => `
      <div class="admin-row">
        <div class="admin-pill">${adminMoney(w.amount_usdt_net)} USDT</div>
        <div class="meta"><b>${escapeHTML(w.wallet_to)}</b><span>${w.gems_requested} 💎 → neto ${w.gems_net} 💎 · fee ${w.fee_percent_gems}+${w.fee_fixed_gems} · Estado: ${escapeHTML(w.status)} · ${new Date(w.created_at).toLocaleString()}</span></div>
        <div class="admin-actions">
          ${w.status === 'pending' ? `<button class="admin-btn ghost" data-wd-action="approve" data-wd-id="${w.id}" type="button">Aprobar</button>` : ''}
          <button class="admin-btn" data-wd-action="pay" data-wd-id="${w.id}" type="button">Pagar USDT</button>
          <button class="admin-btn ghost" data-wd-action="paid" data-wd-id="${w.id}" type="button">Marcar pagado</button>
          <button class="admin-btn danger" data-wd-action="reject" data-wd-id="${w.id}" type="button">Rechazar</button>
        </div>
      </div>`).join('') || '<div class="empty-inventory">No hay retiros pendientes/aprobados.</div>'}</div>`);
    inner.querySelectorAll('[data-wd-action]').forEach(btn => btn.addEventListener('click', async () => {
      const action = btn.dataset.wdAction;
      if(action === 'pay' && !confirm('Esto enviará USDT REAL desde la wallet pagadora configurada en Render. ¿Continuar?')) return;
      const txHash = action === 'paid' ? (prompt('TX hash del pago USDT manual:') || '') : '';
      const note = action === 'reject' ? (prompt('Motivo de rechazo (opcional):') || '') : '';
      try{ await adminFetch('/api/admin/withdrawals/action', { method:'POST', body: JSON.stringify({ withdrawalId: btn.dataset.wdId, action, txHash, note }) }); toast('Retiro actualizado', true); adminLoadWithdrawals(); }
      catch(e){ toast(e.message, false); }
    }));
  }catch(e){ adminError(e); }
}
async function adminLoadGifts(){

  try{
    const [usersData, catalogData] = await Promise.all([
      adminFetch('/api/admin/users', { method:'GET' }),
      adminFetch('/api/admin/catalog', { method:'GET' })

    const options = (catalogData.catalog || []).map(c => `<option value="${c.code}">${escapeHTML(c.display_name)} · ${c.item_type} · ${c.price_gems}💎</option>`).join('');
    adminSetContent(`
      <div class="admin-form">
        <input class="m-input" id="gift-wallet" placeholder="Wallet destino UQ...">
        <div class="admin-two"><input class="m-input" id="gift-gems" inputmode="numeric" placeholder="Gemas a regalar"><button class="admin-btn" id="gift-gems-btn" type="button">Regalar gemas</button></div>
        <div class="admin-two"><select class="admin-select" id="gift-nft">${options}</select><button class="admin-btn" id="gift-nft-btn" type="button">Regalar NFT</button></div>
      </div>
      <div class="m-section">Wallets recientes</div>
      <div class="admin-list">${(usersData.users || []).slice(0,20).map(u => `<div class="admin-row"><div class="meta"><b>${escapeHTML(u.wallet_address)}</b><span>${u.gems || 0} 💎 · NFTs: ${u.nft_count || 0}</span></div><button class="admin-btn ghost" data-pick-gift-wallet="${escapeHTML(u.wallet_address)}" type="button">Elegir</button></div>`).join('')}</div>`);
    inner.querySelectorAll('[data-pick-gift-wallet]').forEach(b => b.addEventListener('click', () => { inner.querySelector('#gift-wallet').value = b.dataset.pickGiftWallet; }));
    inner.querySelector('#gift-gems-btn')?.addEventListener('click', async () => {
      const wallet = inner.querySelector('#gift-wallet').value.trim();
      const gems = parseInt(inner.querySelector('#gift-gems').value.replace(/[^0-9]/g,'')) || 0;
      try{ await adminFetch('/api/admin/gifts/gems', { method:'POST', body: JSON.stringify({ wallet, gems }) }); toast('Gemas regaladas', true); adminLoadGifts(); }
      catch(e){ toast(e.message, false); }
    });
    inner.querySelector('#gift-nft-btn')?.addEventListener('click', async () => {
      const wallet = inner.querySelector('#gift-wallet').value.trim();
      const catalogCode = inner.querySelector('#gift-nft').value;
      try{ await adminFetch('/api/admin/gifts/nft', { method:'POST', body: JSON.stringify({ wallet, catalogCode }) }); toast('NFT regalado', true); adminLoadGifts(); }
      catch(e){ toast(e.message, false); }
    });
  }catch(e){ adminError(e); }
}

function closeModal(){
  clearActiveTimers();
  backdrop.classList.remove('open');
  inner.innerHTML = '';
  document.body.style.overflow = '';
  if(lastFocusedEl && typeof lastFocusedEl.focus === 'function') lastFocusedEl.focus();
}
backdrop.addEventListener('click', e => { if(e.target === backdrop) closeModal(); });
document.addEventListener('keydown', e => {
  if(!backdrop.classList.contains('open')) return;
  if(e.key === 'Escape'){ closeModal(); return; }
  if(e.key === 'Tab'){
    const focusables = inner.querySelectorAll('button,[href],input,select,textarea,[tabindex]:not([tabindex="-1"])');
    if(!focusables.length) return;
    const first = focusables[0];
    const last = focusables[focusables.length - 1];
    if(e.shiftKey && document.activeElement === first){ e.preventDefault(); last.focus(); }
    else if(!e.shiftKey && document.activeElement === last){ e.preventDefault(); first.focus(); }
  }
});

document.querySelectorAll('[data-modal]').forEach(btn => {
  btn.addEventListener('click', () => {
    if(btn.classList.contains('tab')){
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t === btn));
    }
    openModal(btn.getAttribute('data-modal'));
  });
});

if(appClose){

}

}

<script src="https://unpkg.com/@tonconnect/ui@2.0.9/dist/tonconnect-ui.min.js"></script>
<script>
(function(){
  try{
    var manifestUrl = window.location.origin + '/tonconnect-manifest.json';
    var tcUI = new TON_CONNECT_UI.TonConnectUI({
      manifestUrl: manifestUrl,
      buttonRootId: 'ton-connect',
      uiPreferences: { theme: 'DARK' }
    });
    window.tonConnectUI = tcUI;
    if(typeof prepareTonProofRequest === 'function') prepareTonProofRequest(tcUI);
    if(typeof refreshAdminStatus === 'function') refreshAdminStatus();
    function shortAddr(a){ return a ? a.slice(0,4)+'…'+a.slice(-4) : ''; }
    function toUserFriendly(raw){
      // raw form like "0:abcd..." — display as-is short; TonConnect SDK provides friendly via account.address (raw hex). Keep simple short.
      return shortAddr(raw);
    }
    tcUI.onStatusChange(function(wallet){
      var chip = document.getElementById('ton-chip');
      var winp = document.querySelector('#r-wallet');
      if(wallet && wallet.account){
        var addr = wallet.account.address;
        if(chip){ chip.style.display='none'; chip.textContent = '🪙 ' + toUserFriendly(addr); }
        window.STATE && (window.STATE.tonWallet = addr);
        if(typeof syncUserState === 'function') syncUserState(addr);
        if(typeof verifyTonProof === 'function') verifyTonProof(wallet);
      } else {
        if(chip){ chip.style.display='none'; chip.textContent=''; }
        window.STATE && (window.STATE.tonWallet = null);
        if(typeof clearAdminSession === 'function') clearAdminSession();
        if(typeof prepareTonProofRequest === 'function') prepareTonProofRequest(tcUI);
      }
    });
  }catch(e){
    console.error('TonConnect init failed', e);
    var root = document.getElementById('ton-connect');
    if(root){ root.innerHTML = '<button class="chip" type="button" disabled>Wallet no disponible</button>'; }
  }
})();
</script>

<script>
(function(){
  const SIDE_ICON_MAP = {
    logros:'🏆',
    goles:'⚽',
    reclamos:'🎁',
    nivel:'⭐',
    deposito:'💎',
    torneo:'🏆',
    retiro:'💸',
    referido:'👥'
  };
  function applyRealSideIcons(){
    document.querySelectorAll('.stage .rail .icon-btn[data-modal]').forEach(btn => {
      const name = btn.getAttribute('data-modal');
      const icon = SIDE_ICON_MAP[name];
      const glyph = btn.querySelector('.glyph');
      if(!icon || !glyph) return;
      glyph.innerHTML = '<span class="real-ico" aria-hidden="true">' + icon + '</span>';
      btn.setAttribute('title', btn.getAttribute('aria-label') || name);
    });
  }
  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', applyRealSideIcons);
  else applyRealSideIcons();
})();

</script>
