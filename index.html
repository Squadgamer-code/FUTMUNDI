.tabbar{display:grid;grid-template-columns:repeat(4,1fr);padding:14px 8px 18px;background:transparent;border:none}.tab{display:flex;flex-direction:column;align-items:center;gap:6px;padding:6px;font-family:"Oswald",sans-serif;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--fm-text-dim);transition:color .2s,transform .2s;background:transparent;cursor:pointer}.tab svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;filter:drop-shadow(0 2px 4px rgba(0,0,0,.6)) drop-shadow(0 0 8px rgba(79,217,196,.25));transition:filter .25s}.tab:hover,.tab.active{color:var(--fm-gold)}.tab:hover svg,.tab.active svg{filter:drop-shadow(0 2px 4px rgba(0,0,0,.6)) drop-shadow(0 0 12px rgba(232,195,74,.6))}.tab:hover{transform:translateY(-2px)}

const FM={
  openModal(name){const t=TEMPLATES[name];if(!t)return;const m=document.getElementById("fm-modal"),i=document.getElementById("fm-modal-inner");i.innerHTML=`<div class="modal-head"><div class="modal-title${name==='admin'?' admin':''}>${t.title}</div><button class="modal-close" onclick="FM.closeModal()">✕</button></div>${t.body}`;m.classList.add("open")},closeModal(){document.getElementById("fm-modal").classList.remove("open")},selectNFT(type){APP.selectedNFT=type;const info=NFT_TEMPLATES[type],el=document.getElementById("selected-nft");document.getElementById("selected-nft-text").textContent=`${info.emoji} ${info.name}`;el.style.display="block";document.getElementById("admin-submit").disabled=false},selectDeposit(u,g){document.getElementById("d-usd").textContent="$"+u;APP.selected={usd:u,gems:g}},processDeposit(){if(!APP.selected){FM.showError("d-error","Selecciona un paquete");return}const b=document.getElementById("d-submit");b.textContent="Procesando...";b.disabled=true;setTimeout(()=>{APP.user.gems+=APP.selected.gems;FM.showSuccess("d-error",`✓ Depósito de $${APP.selected.usd} procesado. +${APP.selected.gems} gemas`);FM.updateUI();b.textContent="Conectar Wallet & Depositar";b.disabled=false;setTimeout(FM.closeModal,1500)},1500)},giftNFT(){const w=document.getElementById("admin-wallet-target").value;if(!w||w.length<34){FM.showError("admin-error","Wallet TON inválida (34+ caracteres)");return}if(!APP.selectedNFT){FM.showError("admin-error","Selecciona un NFT");return}const nft=NFT_TEMPLATES[APP.selectedNFT],b=document.getElementById("admin-submit");b.textContent="Enviando...";b.disabled=true;setTimeout(()=>{FM.showSuccess("admin-success",`✓ ${nft.emoji} ${nft.name} enviado a ${w.slice(0,3)}...${w.slice(-4)}`);b.textContent="Enviar NFT";b.disabled=false;setTimeout(FM.closeModal,2000)},1000)},calcFee(){const a=parseInt(document.getElementById("r-amount").value)||0,f=Math.ceil(a*0.05),t=a+f;document.getElementById("fee-amt").textContent=a+" 💎";document.getElementById("fee-pct").textContent=f+" 💎";document.getElementById("fee-total").textContent=t+" 💎"},withdrawHandler(){const w=document.getElementById("r-wallet").value,a=parseInt(document.getElementById("r-amount").value)||0,ans=parseInt(document.getElementById("r-captcha-ans").value);if(!w||w.length<34){FM.showError("r-error","Wallet TON inválida");return}if(!a||a<160||a>3200){FM.showError("r-error","Monto entre 160 y 3200 💎");return}if(ans!==7){FM.showError("r-error","3+4=7");return}const f=Math.ceil(a*0.05),t=a+f;FM.showSuccess("r-success",`✓ Retiro de ${t}💎 confirmado`);APP.user.gems=Math.max(0,APP.user.gems-t);FM.updateUI();setTimeout(FM.closeModal,2000)},joinTournament(){if(APP.tournament.nftUsers<100){alert("Se necesitan 100 usuarios con NFT");return}const b=document.getElementById("tour-submit");b.textContent="Procesando...";b.disabled=true;setTimeout(()=>{FM.showSuccess("tour-msg","✓ ¡Registrado!");b.textContent="¡Ya registrado!";setTimeout(FM.closeModal,1500)},800)},buyGems(q,p){if(!confirm(`¿Comprar ${q} gemas por $${p}?`))return;APP.user.gems+=q;FM.showSuccess("gems-msg",`✓ +${q} gemas`);FM.updateUI();setTimeout(()=>{const e=document.getElementById("gems-msg");if(e)e.classList.remove("show")},2000)},switchTab(t){document.querySelectorAll(".tab-content").forEach(e=>e.classList.remove("active"));document.querySelectorAll(".tab-nav-btn").forEach(e=>e.classList.remove("active"));const e=document.getElementById(t+"-tab");if(e)e.classList.add("active");event.target.classList.add("active")},showError(id,msg){const el=document.getElementById(id);if(el){el.textContent=msg;el.classList.add("show")}},showSuccess(id,msg){const el=document.getElementById(id);if(el){el.textContent=msg;el.classList.add("show")}},updateUI(){document.getElementById("pts").textContent=APP.user.pts;document.getElementById("nivel").textContent=APP.user.nivel;document.getElementById("gems-val").textContent=APP.user.gems}};

document.querySelectorAll("[data-modal]").forEach(el=>{el.addEventListener("click",e=>{e.preventDefault();FM.openModal(el.dataset.modal)})});
document.getElementById("closeBtn").addEventListener("click",()=>{if(confirm("¿Cerrar aplicación?"))window.close()});
window.addEventListener("load",()=>{FM.updateUI();APP.user.wallet=ADMIN_WALLET;APP.user.isAdmin=true;document.getElementById("admin-chip").style.display="flex";document.getElementById("admin-btn").style.display="flex";console.log("✅ FUTMUNDI v4.0 - ADMIN MASTER ACTIVO")});
</script>
