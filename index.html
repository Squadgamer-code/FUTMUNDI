<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FUTMUNDI — El juego de fútbol NFT más épico del mundo</title>
<meta name="description" content="FUTMUNDI: torneos globales, futbolistas NFT y partidos en vivo." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://ton-connect.github.io/sdk/tonconnect-ui.js"></script>
<style>
:root{--fm-gold:#f4c542;--fm-gold-soft:#ffe27a;--fm-gold-deep:#7a5410;--fm-blue:#3fbfff;--fm-blue-deep:#0a4a72;--fm-cyan:#39ff88;--fm-cyan-deep:#1d5a2a;--fm-text:#e8f5e2;--fm-text-dim:#7a9785;--fm-surface:#0f1f18}
body{margin:0;padding:0;font-family:"Rajdhani",sans-serif;background:linear-gradient(135deg,#020a09 0%,#0a1f15 50%,#050a07 100%);color:var(--fm-text);overflow-x:hidden;display:flex;flex-direction:column;min-height:100vh}
.header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 10px;font-size:11px;letter-spacing:.15em;text-transform:uppercase}.statusbar{display:flex;gap:14px;color:var(--fm-text-dim)}.statusbar b{color:var(--fm-cyan)}.lvl{color:var(--fm-gold)}.close{background:none;border:none;color:var(--fm-text);font-size:32px;cursor:pointer;padding:0;line-height:1}
.chips{display:flex;gap:10px;justify-content:center;padding:0 12px 8px;flex-wrap:wrap}.chip{background:rgba(57,255,136,.12);border:1px solid rgba(57,255,136,.3);border-radius:20px;padding:6px 12px;font-size:10px;letter-spacing:.12em;color:var(--fm-cyan);text-transform:uppercase}.chip.admin{background:rgba(244,197,66,.15);border-color:var(--fm-gold);color:var(--fm-gold)}
main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 12px 16px;text-align:center}.title{font-family:"Oswald",sans-serif;font-weight:700;letter-spacing:.08em;font-size:42px;color:var(--fm-text);margin:8px 0 4px;line-height:1.1}.sub{color:var(--fm-text-dim);font-size:13px;letter-spacing:.08em;margin:0 0 12px}
.stage{width:100%;max-width:640px;display:grid;grid-template-columns:auto 1fr auto;align-items:center;justify-items:center;gap:6px;margin-bottom:22px}.rail{display:flex;flex-direction:column;gap:18px}.rail.right{gap:18px}
.icon-btn{position:relative;display:flex;flex-direction:column;align-items:center;gap:7px;width:62px;transition:transform .35s cubic-bezier(.34,1.56,.64,1)}.icon-btn:hover{transform:translateY(-3px)}.icon-btn .glyph{width:48px;height:48px;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,rgba(57,255,136,.15),rgba(45,200,100,.08));border:1.5px solid rgba(57,255,136,.3);border-radius:12px;animation:glow 3s ease-in-out infinite}.icon-btn .glyph svg{width:28px;height:28px;fill:none;stroke:var(--fm-cyan);stroke-width:2;stroke-linecap:round;stroke-linejoin:round}.icon-btn.gold .glyph{border-color:var(--fm-gold);background:linear-gradient(180deg,rgba(244,197,66,.15),rgba(255,225,122,.05))}.icon-btn.gold .glyph svg{stroke:var(--fm-gold)}.icon-btn .lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--fm-text);font-weight:500}
.icon-btn .badge{position:absolute;top:-4px;right:2px;min-width:18px;height:18px;padding:0 5px;display:inline-flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#ff5a5a,#c91616);border:2px solid var(--fm-surface);border-radius:10px;font-size:11px;font-weight:700;color:#fff;font-family:"Oswald"}
.hero-wrap{position:relative;width:100%;max-width:340px;aspect-ratio:1;display:flex;align-items:center;justify-content:center;margin:0 auto;isolation:isolate}.hero-wrap::before{content:"";position:absolute;inset:0;background:conic-gradient(from 0deg,var(--fm-cyan),var(--fm-gold),var(--fm-blue),var(--fm-cyan));border-radius:50%;opacity:.4;animation:spin 20s linear infinite;filter:blur(20px)}@keyframes spin{to{transform:rotate(360deg)}}.hero-img{width:80%;height:80%;border-radius:50%;border:2px solid var(--fm-cyan);filter:drop-shadow(0 0 20px rgba(57,255,136,.4))}.hero-fallback{font-family:"Oswald";font-size:60px;font-weight:700;color:var(--fm-gold)}
.actions{width:100%;max-width:420px;display:grid;grid-template-columns:1fr 1fr;gap:18px;padding:0 8px}.btn-play{position:relative;display:flex;align-items:center;justify-content:center;aspect-ratio:1;border-radius:16px;border:none;overflow:hidden;cursor:pointer;transition:transform .2s}.btn-play:hover{transform:scale(1.05)}.btn-play:active{transform:scale(.98)}.btn-play::before{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(57,255,136,.1),transparent);pointer-events:none}.btn-play .ill{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:48px;font-weight:700;background:linear-gradient(180deg,rgba(21,36,25,.5),rgba(7,13,9,.8));border:1px solid rgba(57,255,136,.3);border-radius:16px}.btn-play .ill img{width:100%;height:100%;object-fit:cover}
.tabbar{display:grid;grid-template-columns:repeat(4,1fr);padding:14px 8px 18px;background:transparent;border:none}.tab{display:flex;flex-direction:column;align-items:center;gap:6px;padding:6px;font-size:11px;letter-spacing:.12em;text-transform:uppercase;background:none;border:none;color:var(--fm-text-dim);cursor:pointer;transition:.2s}.tab.active{color:var(--fm-cyan)}.tab svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
@keyframes glow{0%,100%{box-shadow:inset 0 1px 0 rgba(255,255,255,.6),inset 0 -2px 0 rgba(0,0,0,.25),0 0 20px rgba(232,195,74,.35)}50%{box-shadow:inset 0 1px 0 rgba(255,255,255,.6),inset 0 -2px 0 rgba(0,0,0,.25),0 0 40px rgba(232,195,74,.5)}}
@media (max-width:380px){.icon-btn{width:54px}.icon-btn .glyph{width:42px;height:42px}.icon-btn .glyph svg{width:24px;height:24px}.icon-btn .lbl{font-size:9px;letter-spacing:.12em}.rail{gap:14px}.title{font-size:36px}.actions{grid-template-columns:1fr;max-width:100%}}

.m-broadcast-bar{display:flex;align-items:center;gap:8px;margin:-4px 0 12px;font-family:"Oswald";font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--fm-cyan)}.m-broadcast-bar .live{background:linear-gradient(90deg,#ff5a5a,#c91616);padding:4px 8px;border-radius:4px;color:#fff;font-weight:700;animation:pulse .8s ease-in-out infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}.m-broadcast-bar .sep{width:1px;height:14px;background:rgba(57,255,136,.2)}

.modal-backdrop{position:fixed;inset:0;background:rgba(2,10,9,.78);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:none;align-items:flex-start;justify-content:center;z-index:1000;padding-top:40px;overflow-y:auto}
.modal-backdrop.active{display:flex;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}@keyframes slideUp{from{opacity:0;transform:translateY(20px) scale(.96)}to{opacity:1;transform:none}}
.modal{position:relative;width:100%;max-width:420px;background:radial-gradient(ellipse at top,rgba(57,255,136,.14),transparent 55%),linear-gradient(180deg,var(--fm-surface) 0%,#050a07 100%);border:1px solid rgba(57,255,136,.25);border-radius:24px;padding:20px;margin-bottom:40px;animation:slideUp .3s cubic-bezier(.34,1.56,.64,1)}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}.modal-title{font-family:"Oswald",sans-serif;font-weight:700;letter-spacing:.22em;font-size:14px;text-transform:uppercase;color:var(--fm-cyan)}.modal-close{background:none;border:none;font-size:24px;cursor:pointer;color:var(--fm-text-dim)}

.m-hero{position:relative;background:linear-gradient(180deg,rgba(21,36,25,.85),rgba(7,13,9,.9));border:1px solid rgba(57,255,136,.25);border-radius:24px;padding:20px 16px 22px;text-align:center;margin-bottom:16px}
.m-bignum{font-family:"Oswald",sans-serif;font-size:44px;font-weight:700;letter-spacing:.04em;background:linear-gradient(180deg,#fff,var(--fm-gold) 55%,var(--fm-gold-deep));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin:0}

.m-section{font-family:"Oswald",sans-serif;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--fm-cyan);margin:6px 0 10px;text-align:center;display:flex;align-items:center;gap:6px;justify-content:center}.m-section::before,.m-section::after{content:"";flex:1;height:1px;background:rgba(57,255,136,.2)}

.m-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}.m-row{display:flex;align-items:center;gap:12px;background:linear-gradient(180deg,rgba(21,36,25,.65),rgba(7,13,9,.8));border:1px solid rgba(57,255,136,.18);border-radius:12px;padding:12px;font-size:12px}

.m-cta{width:100%;padding:15px;border-radius:22px;font-family:"Oswald",sans-serif;font-weight:700;letter-spacing:.18em;text-transform:uppercase;font-size:13px;color:#1a1003;background:linear-gradient(180deg,var(--fm-gold),var(--fm-gold-soft));border:none;cursor:pointer;transition:.2s}.m-cta:hover{filter:brightness(1.1)}

.m-warn{background:rgba(193,67,42,.1);border:1px solid rgba(193,67,42,.3);color:#ffb09b;border-radius:8px;padding:8px 10px;font-size:11px;text-align:center;margin-bottom:10px}.m-warn.success{background:rgba(63,174,107,.15);border-color:rgba(63,174,107,.3);color:#7ddc9b}

.input-field{width:100%;padding:12px;background:rgba(0,0,0,.3);border:1px solid rgba(57,255,136,.2);border-radius:12px;color:var(--fm-text);font-size:13px}.input-field::placeholder{color:var(--fm-text-dim)}

.success-msg{display:none;padding:12px;background:rgba(63,174,107,.15);border:1px solid rgba(63,174,107,.3);border-radius:12px;color:#7ddc9b;text-align:center;margin-bottom:10px;font-size:12px}.success-msg.show{display:block}

.gem-package{background:linear-gradient(180deg,rgba(21,36,25,.75),rgba(7,13,9,.9));border:1px solid rgba(57,255,136,.22);border-radius:16px;padding:12px;margin-bottom:10px;cursor:pointer;transition:.2s}.gem-package:hover{border-color:var(--fm-gold);background:linear-gradient(180deg,rgba(21,36,25,.85),rgba(7,13,9,.95))}

.tournament-card{background:linear-gradient(180deg,rgba(21,36,25,.75),rgba(7,13,9,.9));border:1px solid rgba(57,255,136,.22);border-radius:16px;padding:12px;margin-bottom:10px;cursor:pointer;transition:.2s}.tournament-card:hover{border-color:var(--fm-cyan)}

.contract-box{background:rgba(0,0,0,.3);border:1px solid rgba(57,255,136,.2);border-radius:10px;padding:10px;margin:10px 0;word-break:break-all}.contract-box .lbl{font-size:10px;color:var(--fm-text-dim)}

.admin-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}.nft-card{background:linear-gradient(180deg,rgba(244,197,66,.15),rgba(122,84,16,.25));border:1px solid var(--fm-gold);border-radius:12px;padding:12px;text-align:center;cursor:pointer}.nft-card:hover{background:linear-gradient(180deg,rgba(244,197,66,.2),rgba(122,84,16,.3))}

.ranking-list{max-height:300px;overflow-y:auto}.ranking-item{display:flex;align-items:center;gap:10px;padding:8px;background:linear-gradient(180deg,rgba(21,36,25,.65),rgba(7,13,9,.8));border:1px solid rgba(57,255,136,.15);border-radius:10px;margin-bottom:6px;font-size:12px}

.tabs-nav{display:flex;gap:6px;margin-bottom:12px;background:rgba(0,0,0,.35);border:1px solid rgba(57,255,136,.18);border-radius:14px;padding:4px}.tab-nav-btn{flex:1;padding:8px 4px;font-family:"Oswald";font-size:11px;letter-spacing:.1em;text-transform:uppercase;background:none;border:none;color:var(--fm-text-dim);cursor:pointer;border-radius:10px;transition:.2s}.tab-nav-btn.active{background:rgba(57,255,136,.2);color:var(--fm-cyan)}

.tab-content{display:none}.tab-content.active{display:block;animation:fadeIn .2s}
</style>
</head>
<body>
<header class="header">
  <div class="statusbar">
    <span>PTS: <b id="pts">104</b></span>
    <span class="lvl">NIVEL: <b id="nivel">1</b></span>
    <span>🏆 <b id="rating">4.0</b></span>
    <span>💎 <b id="gems-val">0</b></span>
  </div>
  <button class="close" aria-label="Cerrar" id="closeBtn">×</button>
</header>
<div class="chips">
  <span class="chip">👥 REFERIDOS: <b id="referidos">0</b></span>
  <span class="chip" id="ton-chip" style="display:none"><b id="wallet-addr">UQ...</b></span>
</div>

<main>
  <h1 class="title">FUTMUNDI</h1>
  <p class="sub">El juego de fútbol NFT más épico del mundo</p>

  <div class="stage">
    <aside class="rail" aria-label="Progreso">
      <button class="icon-btn gold" type="button" aria-label="Logros" data-modal="logros">
        <span class="glyph"><svg viewBox="0 0 24 24"><path d="M7 4h10v3.5a5 5 0 0 1-10 0V4Z"/><path d="M17 5.5h3v1.5a3 3 0 0 1-3 3"/><path d="M7 5.5H4v1.5a3 3 0 0 0 3 3"/><path d="M10 12.5h4l-.5 3h-3l-.5-3Z"/></svg></span>
        <span class="lbl">Logros</span>
      </button>
      <button class="icon-btn" type="button" aria-label="Goles" data-modal="goles">
        <span class="glyph"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8.5"/><path d="M12 6.5 8.2 9.3l1.5 4.5h4.6l1.5-4.5L12 6.5Z"/><path d="M12 6.5V3.5M8.2 9.3 5.4 7.8M15.8 9.3l2.8-1.5M9.5 14l1 3.5M14.5 14l-1 3.5"/></svg></span>
        <span class="lbl">Goles</span>
      </button>
      <button class="icon-btn" type="button" aria-label="Reclamos" data-modal="reclamos">
        <span class="badge" id="daily-badge">3</span>
        <span class="glyph"><svg viewBox="0 0 24 24"><path d="M3.5 11h17v9.5h-17z"/><path d="M2.5 7.5h19v3.5h-19z"/><path d="M12 7.5v13"/><path d="M12 7.5c-1.2-2.5-2.6-4-4.5-4a2.2 2.2 0 0 0 0 4Z"/><path d="M12 7.5c1.2-2.5 2.6-4 4.5-4a2.2 2.2 0 0 1 0 4Z"/></svg></span>
        <span class="lbl">Reclamos</span>
      </button>
      <button class="icon-btn" type="button" aria-label="Nivel" data-modal="nivel">
        <span class="glyph"><svg viewBox="0 0 24 24"><path d="m12 3 2.6 5.4 5.9.9-4.3 4.1 1 5.9L12 16.6 6.8 19.3l1-5.9-4.3-4.1 5.9-.9L12 3Z"/><path d="M9.5 11.5 12 13l2.5-1.5"/></svg></span>
        <span class="lbl">Nivel</span>
      </button>
    </aside>

    <div class="hero-wrap">
      <img class="hero-img" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'%3E%3Cdefs%3E%3ClinearGradient id='grad' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%2339ff88;stop-opacity:0.8'/%3E%3Cstop offset='100%25' style='stop-color:%233fbfff;stop-opacity:0.6'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='100' cy='100' r='90' fill='url(%23grad)'/%3E%3Ctext x='50%25' y='50%25' font-size='80' font-weight='bold' text-anchor='middle' dominant-baseline='middle' fill='%23020a09' font-family='Oswald'%3EFM%3C/text%3E%3C/svg%3E" alt="FUTMUNDI Logo"/>
      <div class="hero-fallback" style="display:none">FM</div>
    </div>

    <aside class="rail" aria-label="Billetera y torneo">
      <button class="icon-btn gold" type="button" aria-label="Depósito" data-modal="deposito">
        <span class="glyph"><svg viewBox="0 0 24 24"><path d="M3.5 9h17v10.5h-17z"/><path d="M3.5 9V6.5h13V9"/><circle cx="16.5" cy="14" r="1.4"/><path d="M12 2.5v6"/><path d="m9.5 6 2.5 2.5L14.5 6"/></svg></span>
        <span class="lbl">Depósito</span>
      </button>
      <button class="icon-btn" type="button" aria-label="Torneo" data-modal="torneo">
        <span class="glyph"><svg viewBox="0 0 24 24"><path d="M8 3h8l-.5 4.5a3.5 3.5 0 0 1-7 0L8 3Z"/><path d="M16 4.5h3v2a3 3 0 0 1-3 3"/><path d="M8 4.5H5v2a3 3 0 0 0 3 3"/><path d="M10.5 11.5h3v9H10.5z"/><path d="M7 18.5h10"/></svg></span>
        <span class="lbl">Torneo</span>
      </button>
      <button class="icon-btn" type="button" aria-label="Retiro" data-modal="retiro">
        <span class="glyph"><svg viewBox="0 0 24 24"><path d="M3.5 9h17v10.5h-17z"/><path d="M3.5 9V6.5h13V9"/><circle cx="16.5" cy="14" r="1.4"/><path d="M12 8.5v-6"/><path d="m9.5 5 2.5-2.5L14.5 5"/></svg></span>
        <span class="lbl">Retiro</span>
      </button>
      <button class="icon-btn" type="button" aria-label="Referido" data-modal="referido">
        <span class="badge gold">+2</span>
        <span class="glyph"><svg viewBox="0 0 24 24"><circle cx="9" cy="8" r="3.2"/><path d="M2.8 19.5a6.2 6.2 0 0 1 12.4 0"/><circle cx="17.5" cy="9.5" r="2.3"/><path d="M15.5 19.5a4.6 4.6 0 0 1 9.2 0"/></svg></span>
        <span class="lbl">Referido</span>
      </button>
    </aside>
  </div>

  <div class="actions">
    <button class="btn-play" type="button" aria-label="Jugar en el Estadio" data-modal="estadio">
      <span class="ill"><img src="img/estadio.jpg" alt="" loading="lazy" width="512" height="512" onerror="this.parentElement.innerHTML='<div style=&quot;font-size:48px&quot;>🏟️</div>'"/></span>
      <span style="position:absolute;bottom:8px;left:0;right:0;font-family:Oswald;font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase">Estadio</span>
    </button>
    <button class="btn-play" type="button" aria-label="Jugar en la Cancha" data-modal="cancha">
      <span class="ill"><img src="img/cancha.jpg" alt="" loading="lazy" width="512" height="512" onerror="this.parentElement.innerHTML='<div style=&quot;font-size:48px&quot;>⚽</div>'"/></span>
      <span style="position:absolute;bottom:8px;left:0;right:0;font-family:Oswald;font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase">Cancha</span>
    </button>

</main>

<nav class="tabbar">
  <button class="tab active" type="button" data-modal="market">
    <svg viewBox="0 0 24 24"><path d="M3 7h18l-2 12H5L3 7Z"/><path d="M8 7V5a4 4 0 0 1 8 0v2"/></svg>Market

  <button class="tab" type="button" data-modal="entrena">
    <svg viewBox="0 0 24 24"><path d="M3 12h2M19 12h2M6 8v8M18 8v8M9 6v12M15 6v12"/></svg>Entrena.

</nav>

<div class="modal-backdrop" id="fm-modal" role="dialog" aria-modal="true">
  <div class="modal" id="fm-modal-inner"></div>
</div>

<script>
const DEPOSITO_CONTRACT="EQD3u6SffmoBUVzumsMpfG5qzfvYrASNiwW6IRPVqQmv9MIs";
const APP={user:{pts:104,nivel:1,rating:4.0,gems:0,referidos:0},tournament:{nftUsers:75,isOpen:false,participants:[]}};

const TEMPLATES={
  deposito:{title:"Depósito USDT",body:`<div class="m-broadcast-bar"><span class="live">DEPOSIT</span><span class="sep"></span><span>Red TON · USDT</span></div><div class="m-hero"><h3>Monto USD disponible</h3><div class="m-bignum">$0.00</div></div><div class="m-section">Opciones de depósito</div><div class="m-list"><div class="m-row">💳 Tarjeta crédito<span style="margin-left:auto">+3% comisión</span></div><div class="m-row">🏦 Transferencia bancaria<span style="margin-left:auto">Sin comisión</span></div><div class="m-row">⚡ Stablecoin (TON)<span style="margin-left:auto">Instant</span></div></div><button class="m-cta">Conectar billetera</button>`},
  
  retiro:{title:"Retiro USDT",body:`<div class="m-broadcast-bar"><span class="live">WITHDRAW</span><span class="sep"></span><span>Red TON · USDT</span></div><div class="m-hero"><h3>Saldo disponible</h3><div class="m-bignum">$0.00</div></div><div class="m-warn">⚠ Comisión de retiro: 5%</div><div class="m-section">Monto a retirar</div><input class="input-field" type="number" placeholder="Ingresa monto ($10-$500)" min="10" max="500"/><button class="m-cta">Solicitar retiro</button>`},

const FM={
  openModal(name){const t=TEMPLATES[name];if(!t)return;const m=document.getElementById("fm-modal"),i=document.getElementById("fm-modal-inner");i.innerHTML=`<div class="modal-head"><div class="modal-title">${t.title}</div><button class="modal-close" onclick="document.getElementById('fm-modal').classList.remove('active')">×</button></div><div>${t.body}</div>`;m.classList.add("active")},
  updateUI(){document.getElementById("pts").textContent=APP.user.pts;document.getElementById("nivel").textContent=APP.user.nivel;document.getElementById("rating").textContent=APP.user.rating;document.getElementById("gems-val").textContent=APP.user.gems;document.getElementById("referidos").textContent=APP.user.referidos;document.getElementById("nft-count").textContent=APP.tournament.nftUsers}
};

document.querySelectorAll("[data-modal]").forEach(el=>{el.addEventListener("click",e=>{e.preventDefault();FM.openModal(el.dataset.modal)})});
document.getElementById("closeBtn").addEventListener("click",()=>{if(confirm("¿Cerrar aplicación?"))window.close()});
window.addEventListener("load",()=>{FM.updateUI();APP.tournament.nftUsers=75;console.log("✅ FUTMUNDI v3.0 OPTIMIZADO - PARÁMETROS EXACTOS")});
</script>
