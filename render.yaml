services:
  - type: web
    name: futmundi-admin-backend
    runtime: node
    plan: free
    rootDir: admin-backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_WALLETS
        value: UQB9uFaCgM5HVntXHe-mq3xYiYjcLEzvgnZUCffNC5DR-7vg
      - key: ADMIN_TOKEN_SECRET
        generateValue: true
      - key: TON_PROOF_TTL_SECONDS
        value: "300"
      - key: ADMIN_SESSION_TTL_SECONDS
        value: "86400"
      # Cambia estos valores en Render según tu dominio real del frontend.
      # Ejemplo GitHub Pages:
      # CORS_ORIGIN=https://tuusuario.github.io
      # TON_PROOF_ALLOWED_DOMAINS=tuusuario.github.io
      - key: CORS_ORIGIN
        value: ""
      - key: TON_PROOF_ALLOWED_DOMAINS
        value: ""

      - key: USDT_MASTER_ADDRESS
        value: EQCxE6mUtQJKFnGfaROTKOt1lZbDiiX1kCixRv7Nw2Id_sDs
      - key: INVOICE_WALLET_ADDRESS
        value: EQD3u6SffmoBUVzumsMpfG5qzfvYrASNiwW6IRPVqQmv9MIs
      - key: TONCENTER_ENDPOINT
        value: https://toncenter.com/api/v2/jsonRPC

      # Retiros automáticos USDT: crear estas variables en Render Environment.
      # PAYOUT_WALLET_MNEMONIC debe ser una Secret Env Var con las 24 palabras de la wallet que tiene USDT + TON.
      - key: PAYOUT_WALLET_MNEMONIC
        sync: false
      - key: PAYOUT_WALLET_VERSION
        value: v4r2
      - key: TONCENTER_API_KEY
        sync: false
